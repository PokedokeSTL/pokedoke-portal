        // ============ TIME CLOCK ============
        function TimeClock({ language, staffName, staffList }) {
            const [currentEntry, setCurrentEntry] = useState(null);
            const [recentEntries, setRecentEntries] = useState([]);
            const [loading, setLoading] = useState(true);
            const myLoc = staffList.find(s=>s.name===staffName)?.location || "cwe";

            useEffect(() => {
                const unsub = db.collection("timeClock")
                    .where("employee","==",staffName)
                    .orderBy("clockIn","desc").limit(20)
                    .onSnapshot(snap => {
                        const entries = snap.docs.map(d=>({id:d.id,...d.data()}));
                        setCurrentEntry(entries.find(e=>!e.clockOut) || null);
                        setRecentEntries(entries.filter(e=>e.clockOut));
                        setLoading(false);
                    });
                return () => unsub();
            }, [staffName]);

            const clockIn = async () => {
                const now = new Date().toISOString();
                await db.collection("timeClock").add({
                    employee: staffName,
                    clockIn: now,
                    clockOut: null,
                    location: myLoc,
                    date: window.fmtLocalDate()
                });
                window.showToast(language==="es"?"⏰ Reloj iniciado":"⏰ Clocked in", "success");
            };

            const clockOut = async () => {
                if (!currentEntry) return;
                const now = new Date().toISOString();
                const hours = (new Date(now) - new Date(currentEntry.clockIn)) / 1000 / 60 / 60;
                await db.collection("timeClock").doc(currentEntry.id).update({
                    clockOut: now,
                    hoursWorked: hours
                });
                window.showToast((language==="es"?"⏰ Salida registrada — ":"⏰ Clocked out — ") + hours.toFixed(2) + "h", "success");
            };

            const fmtDuration = (entry) => {
                const end = entry.clockOut ? new Date(entry.clockOut) : new Date();
                const ms = end - new Date(entry.clockIn);
                const h = Math.floor(ms / 3600000);
                const m = Math.floor((ms % 3600000) / 60000);
                return `${h}h ${m}m`;
            };

            const totalThisWeek = recentEntries.reduce((sum, e) => sum + (e.hoursWorked || 0), 0);

            return (
                <div className="p-4 pb-24 animate-in">
                    <h2 className="font-display text-2xl font-bold mb-1" style={{color:"var(--text-primary)"}}>⏰ {language==="es"?"Reloj de Tiempo":"Time Clock"}</h2>
                    <p className="text-sm mb-4" style={{color:"var(--text-muted)"}}>{language==="es"?"Marca tu entrada y salida":"Clock in and out for your shift"}</p>

                    {loading ? <Skeleton count={2}/> : (
                        <>
                            {/* Current status */}
                            <div className={"rounded-2xl p-6 text-center mb-4 " + (currentEntry?"bg-gradient-to-br from-green-500 to-emerald-600":"bg-gradient-to-br from-gray-200 to-gray-300")}>
                                <p className={"text-xs font-bold uppercase tracking-wider mb-1 " + (currentEntry?"text-green-100":"text-gray-600")}>{currentEntry?(language==="es"?"Trabajando":"Clocked In"):(language==="es"?"Fuera":"Clocked Out")}</p>
                                {currentEntry ? (
                                    <>
                                        <p className="text-4xl font-bold text-white font-display">{fmtDuration(currentEntry)}</p>
                                        <p className="text-xs text-green-100 mt-1">{language==="es"?"Desde":"Since"} {new Date(currentEntry.clockIn).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</p>
                                    </>
                                ) : (
                                    <p className="text-2xl font-bold" style={{color:"var(--text-secondary)"}}>{new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</p>
                                )}
                            </div>

                            {currentEntry ? (
                                <button onClick={clockOut} className="w-full py-4 bg-red-500 text-white rounded-2xl font-bold text-lg active:scale-95 transition shadow-lg">
                                    🕔 {language==="es"?"Marcar Salida":"Clock Out"}
                                </button>
                            ) : (
                                <button onClick={clockIn} className="w-full py-4 bg-green-600 text-white rounded-2xl font-bold text-lg active:scale-95 transition shadow-lg">
                                    🕘 {language==="es"?"Marcar Entrada":"Clock In"}
                                </button>
                            )}

                            <div className="mt-4 card p-3">
                                <p className="text-xs" style={{color:"var(--text-muted)"}}>{language==="es"?"Esta semana":"This week"}</p>
                                <p className="font-display text-2xl font-bold" style={{color:"var(--text-primary)"}}>{totalThisWeek.toFixed(1)}h</p>
                            </div>

                            <p className="font-bold text-sm mt-4 mb-2" style={{color:"var(--text-primary)"}}>📋 {language==="es"?"Entradas Recientes":"Recent Entries"}</p>
                            <div className="space-y-2">
                                {recentEntries.length === 0 && <p className="text-center text-sm py-6" style={{color:"var(--text-muted)"}}>{language==="es"?"Sin entradas":"No entries yet"}</p>}
                                {recentEntries.slice(0,10).map(e => (
                                    <div key={e.id} className="card p-3 flex justify-between items-center">
                                        <div>
                                            <p className="font-semibold text-sm" style={{color:"var(--text-primary)"}}>{new Date(e.clockIn).toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"})}</p>
                                            <p className="text-xs" style={{color:"var(--text-muted)"}}>{new Date(e.clockIn).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})} → {new Date(e.clockOut).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</p>
                                        </div>
                                        <p className="font-bold text-sm" style={{color:"var(--text-primary)"}}>{(e.hoursWorked||0).toFixed(2)}h</p>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        }

                        language==="es"?"Descongelar congelador":"Defrost freezer",
                        language==="es"?"Revisar inventario":"Take inventory",
                        language==="es"?"Lavar tapetes":"Wash mats",
                        language==="es"?"Mantenimiento de equipos":"Equipment maintenance"
                    ]
                }
            };

            useEffect(() => {
                const unsub = db.collection("checklists").doc(docId).onSnapshot(doc => {
                    setTodayStatus(doc.exists ? (doc.data().completed || {}) : {});
                    setLoading(false);
                });
                return () => unsub();
            }, [docId]);

            const toggleItem = async (idx) => {
                const updated = { ...todayStatus };
                if (updated[idx]) delete updated[idx];
                else updated[idx] = { by: staffName, at: new Date().toISOString() };
                setTodayStatus(updated);
                await db.collection("checklists").doc(docId).set({
                    date: today,
                    location: myLoc==="all"?"cwe":myLoc,
                    type: activeList,
                    completed: updated,
                    updatedAt: new Date().toISOString()
                }, {merge: true});
            };

            const list = DEFAULT_LISTS[activeList];
            const completedCount = Object.keys(todayStatus).length;
            const totalCount = list.items.length;

            return (

        // ============ ACTIVITY LOG (owner only) ============
        function ActivityLog({ language, staffName }) {
            const [activity, setActivity] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                let mounted = true;
                async function load() {
                    try {
                        const items = [];
                        const promises = [
                            db.collection("audits").orderBy("date","desc").limit(20).get(),
                            db.collection("pendingOrders").orderBy("date","desc").limit(20).get(),
                            db.collection("deliveryLog").orderBy("date","desc").limit(20).get(),
                            db.collection("timeOffRequests").orderBy("requestedAt","desc").limit(20).get(),
                            db.collection("shiftSwaps").orderBy("createdAt","desc").limit(20).get(),
                            db.collection("schedules").orderBy("publishedAt","desc").limit(20).get(),
                            db.collection("wasteLog").orderBy("date","desc").limit(20).get()
                        ];
                        const [audits, orders, deliveries, timeOff, swaps, schedules, waste] = await Promise.all(promises);
                        audits.forEach(d=>{const a=d.data();items.push({icon:"🔍",text:a.auditedBy+" "+(language==="es"?"auditó inventario":"audited inventory"),date:a.date,who:a.auditedBy});});
                        orders.forEach(d=>{const o=d.data();items.push({icon:"📦",text:o.orderedBy+" "+(language==="es"?"ordenó de":"ordered from")+" "+o.supplier,date:o.date,who:o.orderedBy});});
                        deliveries.forEach(d=>{const r=d.data();items.push({icon:"📥",text:r.receivedBy+" "+(language==="es"?"recibió entrega":"received delivery"),date:r.date,who:r.receivedBy});});
                        timeOff.forEach(d=>{const t=d.data();items.push({icon:"🏖️",text:t.employee+" "+(language==="es"?"solicitó descanso":"requested time off")+(t.reviewedBy?" — "+(t.status==="approved"?"✅":"❌")+" "+t.reviewedBy:""),date:t.requestedAt,who:t.employee});});
                        swaps.forEach(d=>{const sw=d.data();items.push({icon:"🔄",text:sw.offeredBy+" "+(language==="es"?"ofreció turno":"offered shift")+(sw.claimedBy?" → "+sw.claimedBy:""),date:sw.createdAt,who:sw.offeredBy});});
                        schedules.forEach(d=>{const s=d.data();if(s.publishedAt)items.push({icon:"📅",text:(s.publishedBy||"?")+" "+(language==="es"?"publicó":"published")+" "+(s.location||"")+" "+(language==="es"?"horario":"schedule"),date:s.publishedAt,who:s.publishedBy});});
                        waste.forEach(d=>{const w=d.data();items.push({icon:"🗑️",text:(w.loggedBy||"?")+" "+(language==="es"?"registró merma":"logged waste"),date:w.date,who:w.loggedBy});});
                        items.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
                        if (mounted) {
                            setActivity(items.slice(0, 60));
                            setLoading(false);
                        }
                    } catch(e) { console.error(e); if(mounted) setLoading(false); }
                }
                load();
                return () => { mounted = false; };
            }, [language]);

            return (
                <div className="p-4 pb-24 animate-in">
                    <h2 className="font-display text-2xl font-bold mb-1" style={{color:"var(--text-primary)"}}>📜 {language==="es"?"Registro de Actividad":"Activity Log"}</h2>
                    <p className="text-sm mb-4" style={{color:"var(--text-muted)"}}>{language==="es"?"Lo que ha sucedido recientemente":"Recent activity across the business"}</p>

                    {loading ? <Skeleton count={6}/> : activity.length===0 ? (
                        <p className="text-center text-sm py-6" style={{color:"var(--text-muted)"}}>{language==="es"?"Sin actividad":"No activity yet"}</p>
                    ) : (
                        <div className="space-y-2">
                            {activity.map((a,i) => (
                                <div key={i} className="card p-3 flex items-start gap-3">
                                    <div style={{fontSize: 20, lineHeight: 1}}>{a.icon}</div>
                                    <div className="flex-1 min-w-0">
                                        <p className="text-sm" style={{color:"var(--text-primary)"}}>{a.text}</p>
                                        <p className="text-xs mt-0.5" style={{color:"var(--text-muted)"}}>{a.date ? new Date(a.date).toLocaleString([],{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}) : ""}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }


        // ============ BOOKKEEPING / P&L (owner only) ============
        const EXPENSE_CATEGORIES = [
            {id:"cogs",label:"COGS",labelEs:"Costo de Bienes",icon:"🥩",color:"#dc2626"},
            {id:"labor",label:"Labor",labelEs:"Nómina",icon:"👥",color:"#ea580c"},
            {id:"supplies",label:"Supplies",labelEs:"Suministros",icon:"📦",color:"#d97706"},
            {id:"rent",label:"Rent",labelEs:"Renta",icon:"🏠",color:"#0891b2"},
            {id:"utilities",label:"Utilities",labelEs:"Servicios",icon:"💡",color:"#7c3aed"},
            {id:"marketing",label:"Marketing",labelEs:"Marketing",icon:"📣",color:"#db2777"},
            {id:"equipment",label:"Equipment",labelEs:"Equipo",icon:"🔧",color:"#4f46e5"},
            {id:"insurance",label:"Insurance",labelEs:"Seguro",icon:"🛡️",color:"#0d9488"},
            {id:"other",label:"Other",labelEs:"Otro",icon:"📋",color:"#6b7280"}
        ];

        function Bookkeeping({ language, staffName }) {
            const [bkTab, setBkTab] = useState("flash");
            const [expenses, setExpenses] = useState([]);
            const [sales, setSales] = useState([]);
            const [loading, setLoading] = useState(true);

            // Flash state
            const [flashDate, setFlashDate] = useState(window.fmtLocalDate());
            const [flashLoc, setFlashLoc] = useState("all");

            // Expense form
            const [showExpForm, setShowExpForm] = useState(false);
            const [expDate, setExpDate] = useState(window.fmtLocalDate());
            const [expLoc, setExpLoc] = useState("cwe");
            const [expCat, setExpCat] = useState("cogs");
            const [expAmt, setExpAmt] = useState("");
            const [expVendor, setExpVendor] = useState("");
            const [expNotes, setExpNotes] = useState("");
            const [expRecurring, setExpRecurring] = useState(false);
            const [expSaving, setExpSaving] = useState(false);

            // P&L state
            const [plRange, setPlRange] = useState("month");
            const [plLoc, setPlLoc] = useState("all");

            // Expense list filter
            const [expFilterCat, setExpFilterCat] = useState("all");
            const [expFilterLoc, setExpFilterLoc] = useState("all");

            // Load data
            useEffect(() => {
                const unsub1 = db.collection("expenses").orderBy("date","desc").limit(300).onSnapshot(snap => {
                    setExpenses(snap.docs.map(d=>({id:d.id,...d.data()})));
                });
                const unsub2 = db.collection("dailySales").orderBy("date","desc").limit(90).onSnapshot(snap => {
                    setSales(snap.docs.map(d=>({id:d.id,...d.data()})));
                    setLoading(false);
                });
                return () => { unsub1(); unsub2(); };
            }, []);

            // Helpers
            const fmtM = (n) => "$" + (n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
            const fmtMK = (n) => n >= 1000 ? "$" + (n/1000).toFixed(1) + "k" : "$" + Math.round(n||0).toLocaleString();
            const pct = (part, total) => total > 0 ? (part / total * 100).toFixed(1) + "%" : "—";
            const catInfo = (id) => EXPENSE_CATEGORIES.find(c=>c.id===id) || EXPENSE_CATEGORIES[8];

            const getDateRange = (range) => {
                const today = new Date();
                const end = window.fmtLocalDate();
                let start;
                if (range === "week") { const d = new Date(today); d.setDate(d.getDate()-6); start = window.fmtLocalDate(d); }
                else if (range === "month") { const d = new Date(today); d.setDate(1); start = window.fmtLocalDate(d); }
                else { const d = new Date(today); d.setMonth(d.getMonth()-2); d.setDate(1); start = window.fmtLocalDate(d); }
                return { start, end };
            };

            const filterByDateLoc = (items, start, end, loc) =>
                items.filter(i => i.date >= start && i.date <= end && (loc === "all" || i.location === loc));

            // Save expense
            const saveExpense = async () => {
                if (!expAmt || parseFloat(expAmt) <= 0) return;
                setExpSaving(true);
                try {
                    await db.collection("expenses").add({
                        date: expDate, location: expLoc, category: expCat,
                        amount: parseFloat(expAmt), vendor: expVendor.trim(),
                        notes: expNotes.trim(), recurring: expRecurring,
                        enteredBy: staffName, createdAt: new Date().toISOString()
                    });
                    setExpAmt(""); setExpVendor(""); setExpNotes(""); setExpRecurring(false);
                    setShowExpForm(false);
                    window.showToast(language==="es"?"Gasto guardado":"Expense saved","success");
                } catch(e) { console.error(e); }
                setExpSaving(false);
            };

            const deleteExpense = async (id) => {
                if (!confirm(language==="es"?"¿Eliminar este gasto?":"Delete this expense?")) return;
                await db.collection("expenses").doc(id).delete();
                window.showToast(language==="es"?"Eliminado":"Deleted","success");
            };

            // ═══ FLASH DATA ═══
            const fSales = sales.filter(s => s.date===flashDate && (flashLoc==="all"||s.location===flashLoc));
            const fExp = expenses.filter(e => e.date===flashDate && (flashLoc==="all"||e.location===flashLoc));
            const fRev = fSales.reduce((s,x)=>s+(x.amount||0),0);
            const fTotalExp = fExp.reduce((s,x)=>s+(x.amount||0),0);
            const fCOGS = fExp.filter(e=>e.category==="cogs").reduce((s,x)=>s+(x.amount||0),0);
            const fLabor = fExp.filter(e=>e.category==="labor").reduce((s,x)=>s+(x.amount||0),0);
            const fOther = fTotalExp - fCOGS - fLabor;
            const fProfit = fRev - fTotalExp;
            const fMargin = fRev > 0 ? (fProfit/fRev*100) : 0;

            // ═══ P&L DATA ═══
            const plDates = getDateRange(plRange);
            const plSalesData = filterByDateLoc(sales, plDates.start, plDates.end, plLoc);
            const plExpData = filterByDateLoc(expenses, plDates.start, plDates.end, plLoc);
            const plRev = plSalesData.reduce((s,x)=>s+(x.amount||0),0);
            const plTotalExp = plExpData.reduce((s,x)=>s+(x.amount||0),0);
            const plProfit = plRev - plTotalExp;
            const plCatBreakdown = EXPENSE_CATEGORIES.map(cat => {
                const total = plExpData.filter(e=>e.category===cat.id).reduce((s,x)=>s+(x.amount||0),0);
                return { ...cat, total };
            }).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

            // Filtered expenses for list
            const filteredExp = expenses.filter(e =>
                (expFilterCat === "all" || e.category === expFilterCat) &&
                (expFilterLoc === "all" || e.location === expFilterLoc)
            );

            if (loading) return <div className="p-4 pb-24 animate-in"><Skeleton count={5}/></div>;

            return (
                <div className="p-4 pb-24 animate-in">
                    <h2 className="font-display text-2xl font-bold mb-1" style={{color:"var(--text-primary)"}}>💰 {language==="es"?"Contabilidad":"Bookkeeping"}</h2>
                    <p className="text-sm mb-4" style={{color:"var(--text-muted)"}}>{language==="es"?"Gastos, P&L, y flash diario":"Expenses, P&L, and daily flash"}</p>

                    {/* Sub-tabs */}
                    <div className="flex gap-1 rounded-2xl p-1 mb-4" style={{background:"var(--bg-subtle)"}}>
                        {[
                            {id:"flash",l:"⚡ "+(language==="es"?"Flash":"Flash")},
                            {id:"expenses",l:"💳 "+(language==="es"?"Gastos":"Expenses")},
                            {id:"pnl",l:"📊 P&L"}
                        ].map(tab=>(
                            <button key={tab.id} onClick={()=>setBkTab(tab.id)}
                                className={"flex-1 py-2 px-1 rounded-xl text-xs font-bold transition-all whitespace-nowrap "+(bkTab===tab.id?"bg-poke-600 text-white shadow-md":"")}
                                style={bkTab!==tab.id?{color:"var(--text-secondary)"}:{}}>{tab.l}</button>
                        ))}
                    </div>

                    {/* ═══════════════════════════════════ */}
                    {/* ═══ DAILY FLASH TAB ═══ */}
                    {/* ═══════════════════════════════════ */}
                    {bkTab === "flash" && (
                        <div className="space-y-3">
                            {/* Date + Location */}
                            <div className="card p-3 flex gap-2">
                                <div className="flex-1">
                                    <label className="text-[10px] font-bold" style={{color:"var(--text-muted)"}}>{language==="es"?"FECHA":"DATE"}</label>
                                    <input type="date" value={flashDate} onChange={e=>setFlashDate(e.target.value)}
                                        className="w-full px-2 py-1.5 border rounded-lg text-sm mt-0.5" style={{background:"var(--bg-card)",borderColor:"var(--border-subtle)",color:"var(--text-primary)"}}/>
                                </div>
                                <div className="flex-1">
                                    <label className="text-[10px] font-bold" style={{color:"var(--text-muted)"}}>{language==="es"?"UBICACIÓN":"LOCATION"}</label>
                                    <select value={flashLoc} onChange={e=>setFlashLoc(e.target.value)}
                                        className="w-full px-2 py-1.5 border rounded-lg text-sm mt-0.5" style={{background:"var(--bg-card)",borderColor:"var(--border-subtle)",color:"var(--text-primary)"}}>
                                        <option value="all">{language==="es"?"Todas":"All"}</option>
                                        <option value="cwe">CWE</option>
                                        <option value="kirkwood">Kirkwood</option>
                                    </select>
                                </div>
                            </div>

                            {/* Big P&L card */}
                            <div className="card overflow-hidden">
                                <div style={{background: fProfit >= 0 ? "linear-gradient(135deg, #059669, #10b981)" : "linear-gradient(135deg, #dc2626, #ef4444)", padding: "16px 20px"}}>
                                    <p className="text-white/70 text-xs font-bold">{language==="es"?"GANANCIA NETA":"NET PROFIT"}</p>
                                    <p className="text-white text-3xl font-bold font-display">{fmtM(fProfit)}</p>
                                    <p className="text-white/70 text-sm mt-1">{language==="es"?"Margen":"Margin"}: {fRev>0?fMargin.toFixed(1)+"%":"—"}</p>
                                </div>
                                <div style={{padding: "16px 20px"}}>
                                    <div className="flex justify-between items-center py-2" style={{borderBottom:"1px solid var(--border-subtle)"}}>
                                        <span className="text-sm" style={{color:"var(--text-secondary)"}}>💵 {language==="es"?"Ventas":"Revenue"}</span>
                                        <span className="font-bold text-sm" style={{color:"var(--text-primary)"}}>{fmtM(fRev)}</span>
                                    </div>
                                    <div className="flex justify-between items-center py-2" style={{borderBottom:"1px solid var(--border-subtle)"}}>
                                        <span className="text-sm" style={{color:"var(--text-secondary)"}}>🥩 COGS</span>
                                        <div className="text-right">
                                            <span className="font-bold text-sm" style={{color:"#dc2626"}}>{fmtM(fCOGS)}</span>
                                            <span className="text-xs ml-1" style={{color:"var(--text-muted)"}}>{pct(fCOGS,fRev)}</span>
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center py-2" style={{borderBottom:"1px solid var(--border-subtle)"}}>
                                        <span className="text-sm" style={{color:"var(--text-secondary)"}}>👥 {language==="es"?"Nómina":"Labor"}</span>
                                        <div className="text-right">
                                            <span className="font-bold text-sm" style={{color:"#ea580c"}}>{fmtM(fLabor)}</span>
                                            <span className="text-xs ml-1" style={{color:"var(--text-muted)"}}>{pct(fLabor,fRev)}</span>
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center py-2" style={{borderBottom:"1px solid var(--border-subtle)"}}>
                                        <span className="text-sm" style={{color:"var(--text-secondary)"}}>📋 {language==="es"?"Otros":"Other"}</span>
                                        <div className="text-right">
                                            <span className="font-bold text-sm" style={{color:"#6b7280"}}>{fmtM(fOther)}</span>
                                            <span className="text-xs ml-1" style={{color:"var(--text-muted)"}}>{pct(fOther,fRev)}</span>
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center pt-2">
                                        <span className="text-sm font-bold" style={{color:"var(--text-primary)"}}>{language==="es"?"Total Gastos":"Total Expenses"}</span>
                                        <span className="font-bold text-sm" style={{color:"var(--text-primary)"}}>{fmtM(fTotalExp)}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Quick-add expense for this day */}
                            {fRev > 0 && fTotalExp === 0 && (
                                <button onClick={()=>{setExpDate(flashDate);setShowExpForm(true);}}
                                    className="w-full card p-3 text-center active:scale-95 transition">
                                    <p className="text-sm font-bold" style={{color:"var(--poke-600)"}}>+ {language==="es"?"Agregar gastos de hoy":"Add today's expenses"}</p>
                                </button>
                            )}

                            {/* Today's expense breakdown */}
                            {fExp.length > 0 && (
                                <div className="card p-3">
                                    <p className="text-xs font-bold mb-2" style={{color:"var(--text-muted)"}}>{language==="es"?"GASTOS DEL DÍA":"DAY'S EXPENSES"}</p>
                                    <div className="space-y-1.5">
                                        {fExp.map(e => {
                                            const ci = catInfo(e.category);
                                            return (
                                                <div key={e.id} className="flex items-center justify-between py-1">
                                                    <div className="flex items-center gap-2 flex-1 min-w-0">
                                                        <span style={{fontSize:14}}>{ci.icon}</span>
                                                        <div className="min-w-0">
                                                            <p className="text-xs font-semibold truncate" style={{color:"var(--text-primary)"}}>{e.vendor || (language==="es"?ci.labelEs:ci.label)}</p>
                                                            {e.notes && <p className="text-[10px] truncate" style={{color:"var(--text-muted)"}}>{e.notes}</p>}
                                                        </div>
                                                    </div>
                                                    <span className="text-xs font-bold ml-2" style={{color:ci.color}}>{fmtM(e.amount)}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* ═══════════════════════════════════ */}
                    {/* ═══ EXPENSES TAB ═══ */}
                    {/* ═══════════════════════════════════ */}
                    {bkTab === "expenses" && (
                        <div className="space-y-3">
                            <button onClick={()=>setShowExpForm(true)}
                                className="w-full py-3 bg-poke-600 text-white rounded-xl font-bold text-sm active:scale-95 transition">
                                + {language==="es"?"Agregar Gasto":"Add Expense"}
                            </button>

                            {/* Filters */}
                            <div className="flex gap-2">

                                        const locExp = filterByDateLoc(expenses, plDates.start, plDates.end, loc).reduce((s,x)=>s+(x.amount||0),0);

                                        return (
                                            <div key={loc} className="flex items-center justify-between py-2" style={{borderBottom:"1px solid var(--border-subtle)"}}>
                                                <div>
                                                    <p className="text-sm font-bold" style={{color:"var(--text-primary)"}}>📍 {loc==="cwe"?"Central West End":"Kirkwood"}</p>
                                                    <p className="text-[10px]" style={{color:"var(--text-muted)"}}>{language==="es"?"Ventas":"Rev"}: {fmtMK(locSales)} · {language==="es"?"Gastos":"Exp"}: {fmtMK(locExp)}</p>

                                                <p className="font-bold text-sm" style={{color:locProfit>=0?"#059669":"#dc2626"}}>{fmtMK(locProfit)}</p>

                    {showExpForm && (

                            onClick={e=>{if(e.target===e.currentTarget)setShowExpForm(false);}}>
                            <div style={{background:"var(--bg-card)",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,maxHeight:"90vh",overflowY:"auto",padding:20}}>

                                                    style={{
                                                        borderColor: expCat===cat.id?cat.color:"var(--border-subtle)",
                                                        background: expCat===cat.id?cat.color+"15":"transparent"

                                            className="w-full px-3 py-3 border rounded-xl text-lg font-bold mt-1" style={{background:"var(--bg-card)",borderColor:"var(--border-subtle)",color:"var(--text-primary)"}}/>
                                    </div>

                                    {/* Date + Location */}
                                    <div className="grid grid-cols-2 gap-2">
                                        <div>
                                            <label className="text-xs font-bold" style={{color:"var(--text-secondary)"}}>{language==="es"?"Fecha":"Date"}</label>
                                            <input type="date" value={expDate} onChange={e=>setExpDate(e.target.value)}

        // ============ DASHBOARD (owner only) ============
        function Dashboard({ language, staffName, staffList }) {
            const [stats, setStats] = useState({});
            const [recentActivity, setRecentActivity] = useState([]);

            useEffect(() => {
                let mounted = true;
                async function loadStats() {
                    try {
                        // Inventory stats
                        const invDoc = await db.collection("ops").doc("inventory").get();
                        const counts = invDoc.exists ? invDoc.data().counts || {} : {};
                        const customInv = invDoc.exists ? invDoc.data().customInventory || [] : [];
                        let belowPar = 0, outOfStock = 0;
                        customInv.forEach(cat=>cat.items.forEach(item=>{
                            const c = counts[item.id]||0;
                            if(item.par && c < item.par) belowPar++;
                            if(c === 0 && item.par) outOfStock++;
                        }));

                        // Pending orders
                        const ordersSnap = await db.collection("pendingOrders").where("status","==","pending").get();

                        // Schedule for current week — fix Sunday and timezone
                        const today = new Date();
                        const dow = today.getDay() === 0 ? 7 : today.getDay();
                        const monday = new Date(today); monday.setDate(today.getDate() - dow + 1);
                        const y = monday.getFullYear();
                        const m = String(monday.getMonth() + 1).padStart(2, "0");
                        const d = String(monday.getDate()).padStart(2, "0");
                        const weekStart = `${y}-${m}-${d}`;
                        const schedCWE = await db.collection("schedules").doc("cwe_"+weekStart).get();
                        const schedKW = await db.collection("schedules").doc("kirkwood_"+weekStart).get();
                        const shiftsCWE = schedCWE.exists ? (schedCWE.data().publishedShifts || schedCWE.data().shifts || []) : [];
                        const shiftsKW = schedKW.exists ? (schedKW.data().publishedShifts || schedKW.data().shifts || []) : [];

                        // Time off pending
                        const toSnap = await db.collection("timeOffRequests").where("status","==","pending").get();

                        // Swaps pending
                        const swapSnap = await db.collection("shiftSwaps").where("status","==","pending_approval").get();

                        // Maintenance open
                        const maintSnap = await db.collection("maintenanceRequests").where("status","==","open").get();

                        // Calculate labor cost estimates
                        const wagesDoc = await db.collection("ops").doc("wages").get();
                        const wages = wagesDoc.exists ? wagesDoc.data() : {};
                        const calcHours = (s,e)=>{if(!s||!e)return 0;const[sh,sm]=s.split(":").map(Number);const[eh,em]=e.split(":").map(Number);return Math.max(0,((eh*60+em)-(sh*60+sm))/60);};
                        let totalLaborCWE = 0, totalLaborKW = 0;
                        shiftsCWE.forEach(s=>{if(s.employee!=="__OPEN__"){totalLaborCWE += calcHours(s.startTime,s.endTime)*(wages[s.employee.replace(/\s/g,"_")]||0);}});
                        shiftsKW.forEach(s=>{if(s.employee!=="__OPEN__"){totalLaborKW += calcHours(s.startTime,s.endTime)*(wages[s.employee.replace(/\s/g,"_")]||0);}});

                        // Waste log this week
                        const weekAgo = new Date(Date.now()-7*86400000).toISOString();
                        const wasteSnap = await db.collection("wasteLog").where("date",">=",weekAgo).get();

                        // Get this week's sales for labor cost percentage
                        const salesSnap = await db.collection("dailySales").where("date",">=",weekStart).get();
                        let weekSalesCWE = 0, weekSalesKW = 0;
                        salesSnap.forEach(d => {
                            const s = d.data();
                            if (s.location === "cwe") weekSalesCWE += s.amount || 0;
                            else if (s.location === "kirkwood") weekSalesKW += s.amount || 0;
                        });
                        const totalSales = weekSalesCWE + weekSalesKW;

                        if(!mounted)return;
                        setStats({
                            belowPar, outOfStock,
                            pendingOrders: ordersSnap.size,
                            shiftsThisWeek: shiftsCWE.length + shiftsKW.length,
                            openShifts: shiftsCWE.filter(s=>s.employee==="__OPEN__").length + shiftsKW.filter(s=>s.employee==="__OPEN__").length,
                            pendingTimeOff: toSnap.size,
                            pendingSwaps: swapSnap.size,
                            openMaint: maintSnap.size,
                            laborCWE: totalLaborCWE,
                            laborKW: totalLaborKW,
                            laborTotal: totalLaborCWE + totalLaborKW,
                            salesCWE: weekSalesCWE,
                            salesKW: weekSalesKW,
                            totalSales: totalSales,
                            laborPctCWE: weekSalesCWE > 0 ? (totalLaborCWE / weekSalesCWE * 100) : 0,
                            laborPctKW: weekSalesKW > 0 ? (totalLaborKW / weekSalesKW * 100) : 0,
                            laborPctTotal: totalSales > 0 ? ((totalLaborCWE + totalLaborKW) / totalSales * 100) : 0,
                            wasteThisWeek: wasteSnap.size,
                            activeStaff: staffList.length
                        });

                        // Recent activity feed
                        const activity = [];
                        const auditsSnap = await db.collection("audits").orderBy("date","desc").limit(3).get();
                        auditsSnap.forEach(d=>{const a=d.data();activity.push({type:"audit",text:"🔍 "+a.auditedBy+" audited inventory ("+a.itemsWithVariance+" variances)",date:a.date});});
                        const recentOrders = await db.collection("pendingOrders").orderBy("date","desc").limit(3).get();
                        recentOrders.forEach(d=>{const o=d.data();activity.push({type:"order",text:"📦 "+o.orderedBy+" ordered from "+o.supplier,date:o.date});});
                        const recentDeliveries = await db.collection("deliveryLog").orderBy("date","desc").limit(3).get();
                        recentDeliveries.forEach(d=>{const r=d.data();activity.push({type:"delivery",text:"📥 "+r.receivedBy+" received delivery",date:r.date});});
                        activity.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
                        if(!mounted)return;
                        setRecentActivity(activity.slice(0,8));
                    } catch(e){ console.error(e); }
                }
                loadStats();
                return () => { mounted = false; };
            }, [staffList.length]);

            const card = (icon, label, value, color, sub) => (
                <div className={"bg-white rounded-2xl border border-gray-100 shadow-sm p-4"}>
                    <div className="flex items-center justify-between mb-1">
                        <span className="text-2xl">{icon}</span>
                        <span className={"text-2xl font-bold "+color}>{value}</span>
                    </div>
                    <p className="text-xs text-gray-500 font-semibold">{label}</p>
                    {sub&&<p className="text-[10px] text-gray-400 mt-0.5">{sub}</p>}
                </div>
            );

            return (
                <div className="p-4 pb-24 animate-in">
                    <h2 className="text-2xl font-bold text-gray-800 mb-1">📊 {language==="es"?"Panel Principal":"Dashboard"}</h2>
                    <p className="text-sm text-gray-400 mb-4">{language==="es"?"Vista general del negocio":"Business overview"}</p>

                    {/* Action items */}
                    {(stats.pendingTimeOff>0||stats.pendingSwaps>0||stats.openMaint>0||stats.outOfStock>0)&&(
                        <div className="bg-gradient-to-r from-red-500 to-orange-500 rounded-2xl p-4 mb-4 text-white">
                            <p className="font-bold text-sm mb-2">⚠️ {language==="es"?"Necesita Atención":"Needs Attention"}</p>
                            <div className="space-y-1 text-sm">
                                {stats.outOfStock>0&&<button onClick={()=>setActiveTab("operations")} className="block w-full text-left active:opacity-70">❌ {stats.outOfStock} {language==="es"?"artículos agotados":"items out of stock"}</button>}
                                {stats.pendingTimeOff>0&&<button onClick={()=>setActiveTab("schedule")} className="block w-full text-left active:opacity-70">🏖️ {stats.pendingTimeOff} {language==="es"?"solicitudes de descanso":"time-off requests"}</button>}
                                {stats.pendingSwaps>0&&<button onClick={()=>setActiveTab("schedule")} className="block w-full text-left active:opacity-70">🔄 {stats.pendingSwaps} {language==="es"?"intercambios por aprobar":"swap approvals"}</button>}
                                {stats.openMaint>0&&<button onClick={()=>setActiveTab("maintenance")} className="block w-full text-left active:opacity-70">🔧 {stats.openMaint} {language==="es"?"reparaciones abiertas":"open maintenance"}</button>}
                            </div>
                        </div>
                    )}

                    {/* Stats Grid */}
                    <p className="font-bold text-gray-700 text-sm mb-2">📦 {language==="es"?"Inventario":"Inventory"}</p>
                    <div className="grid grid-cols-3 gap-2 mb-4">
                        {card("📊",language==="es"?"Bajo PAR":"Below PAR",stats.belowPar||0,stats.belowPar>0?"text-orange-600":"text-gray-800")}
                        {card("❌",language==="es"?"Agotados":"Out",stats.outOfStock||0,stats.outOfStock>0?"text-red-600":"text-gray-800")}
                        {card("🛒",language==="es"?"Pedidos":"Orders",stats.pendingOrders||0,"text-blue-600",language==="es"?"pendientes":"pending")}
                    </div>

                    <p className="font-bold text-gray-700 text-sm mb-2">👥 {language==="es"?"Personal":"Staff"}</p>
                    <div className="grid grid-cols-3 gap-2 mb-4">
                        {card("👤",language==="es"?"Equipo":"Team",stats.activeStaff||0,"text-gray-800")}
                        {card("📅",language==="es"?"Turnos":"Shifts",stats.shiftsThisWeek||0,"text-gray-800",language==="es"?"esta semana":"this week")}
                        {card("🆕",language==="es"?"Abiertos":"Open",stats.openShifts||0,stats.openShifts>0?"text-blue-600":"text-gray-800",language==="es"?"sin asignar":"unassigned")}
                    </div>

                    <p className="font-bold text-gray-700 text-sm mb-2">💰 {language==="es"?"Costos":"Labor Costs"}</p>
                    <div className="grid grid-cols-2 gap-2 mb-4">
                        <div className="bg-white rounded-2xl border border-gray-100 p-4">
                            <p className="text-xs text-gray-400">CWE</p>
                            <p className="text-2xl font-bold text-poke-600">${(stats.laborCWE||0).toFixed(0)}</p>
                            {stats.salesCWE > 0 ? (
                                <p className={"text-xs font-bold mt-1 "+(stats.laborPctCWE > 30 ? "text-red-600" : stats.laborPctCWE > 25 ? "text-orange-600" : "text-green-600")}>{stats.laborPctCWE.toFixed(1)}% {language==="es"?"de ventas":"of sales"}</p>
                            ) : (
                                <p className="text-[10px] text-gray-400 mt-1">{language==="es"?"agrega ventas":"add sales to see %"}</p>
                            )}
                        </div>
                        <div className="bg-white rounded-2xl border border-gray-100 p-4">
                            <p className="text-xs text-gray-400">Kirkwood</p>
                            <p className="text-2xl font-bold text-poke-600">${(stats.laborKW||0).toFixed(0)}</p>
                            {stats.salesKW > 0 ? (
                                <p className={"text-xs font-bold mt-1 "+(stats.laborPctKW > 30 ? "text-red-600" : stats.laborPctKW > 25 ? "text-orange-600" : "text-green-600")}>{stats.laborPctKW.toFixed(1)}% {language==="es"?"de ventas":"of sales"}</p>
                            ) : (
                                <p className="text-[10px] text-gray-400 mt-1">{language==="es"?"agrega ventas":"add sales to see %"}</p>
                            )}
                        </div>
                    </div>
                    <div className="bg-gradient-to-r from-poke-700 to-poke-600 rounded-2xl p-4 mb-4 text-white">
                        <p className="text-xs text-poke-200">{language==="es"?"Total Semanal":"Weekly Total"}</p>
                        <p className="text-3xl font-bold">${(stats.laborTotal||0).toFixed(0)}</p>
                        {stats.totalSales > 0 ? (
                            <p className="text-xs text-poke-100 mt-1">
                                <span className="font-bold">{stats.laborPctTotal.toFixed(1)}%</span> {language==="es"?"de ":"of "} ${(stats.totalSales||0).toLocaleString()} {language==="es"?"en ventas":"in sales"}
                            </p>
                        ) : (
                            <p className="text-xs text-poke-200 mt-1">{language==="es"?"costo laboral combinado":"combined labor"}</p>
                        )}
                    </div>

                    {/* Recent Activity */}
                    <p className="font-bold text-gray-700 text-sm mb-2">📜 {language==="es"?"Actividad Reciente":"Recent Activity"}</p>
                    <div className="bg-white rounded-2xl border border-gray-100 shadow-sm divide-y divide-gray-50">
                        {recentActivity.length===0?(
                            <p className="p-4 text-center text-gray-400 text-sm">{language==="es"?"Sin actividad":"No recent activity"}</p>
                        ):recentActivity.map((a,i)=>(
                            <div key={i} className="p-3 flex justify-between items-center">
                                <p className="text-sm text-gray-700">{a.text}</p>
                                <p className="text-xs text-gray-400">{a.date?new Date(a.date).toLocaleDateString():""}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }


        // ============ PROFILE CUSTOMIZATION ============
        function Profile({ language, staffName, userPrefs, saveUserPref, onClose }) {
            const currentColor = userPrefs?.avatarColor || getAvatarColor(staffName, null).id;
            const currentEmoji = userPrefs?.avatarEmoji || "";
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 animate-in" style={{background: "rgba(0,0,0,0.5)"}}>
                    <div className="card p-5 max-w-md w-full animate-scale" style={{maxHeight: "90vh", overflowY: "auto"}}>
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="font-display text-2xl font-bold" style={{color: "var(--text-primary)"}}>{language==="es"?"Mi Perfil":"My Profile"}</h2>
                            <button onClick={onClose} className="text-2xl" style={{color: "var(--text-muted)"}}>×</button>
                        </div>

                        <div className="flex justify-center mb-5">
                            <Avatar name={staffName} prefs={userPrefs} size={80} showEmoji={true} />
                        </div>

                        <p className="text-sm font-bold mb-2" style={{color: "var(--text-primary)"}}>🎨 {language==="es"?"Color del Avatar":"Avatar Color"}</p>
                        <div className="grid grid-cols-5 gap-2 mb-5">
                            {AVATAR_COLORS.map(c => (
                                <button key={c.id} onClick={()=>saveUserPref("avatarColor", c.id)}
                                    style={{
                                        background: c.bg,
                                        height: 48,
                                        borderRadius: 12,
                                        border: currentColor === c.id ? "3px solid #ffc800" : "3px solid transparent",
                                        cursor: "pointer"
                                    }}
                                    aria-label={c.id}
                                />
                            ))}
                        </div>

                        <p className="text-sm font-bold mb-2" style={{color: "var(--text-primary)"}}>😀 {language==="es"?"Emoji (opcional)":"Emoji (optional)"}</p>
                        <div className="grid grid-cols-5 gap-2 mb-2">
                            <button onClick={()=>saveUserPref("avatarEmoji", "")}
                                style={{
                                    background: "var(--bg-subtle)",
                                    height: 48,
                                    borderRadius: 12,
                                    border: !currentEmoji ? "3px solid #ffc800" : "3px solid transparent",
                                    fontSize: 14,
                                    color: "var(--text-secondary)",
                                    fontWeight: 700
                                }}>
                                {language==="es"?"NINGUNO":"NONE"}
                            </button>
                            {AVATAR_EMOJIS.map(e => (
                                <button key={e} onClick={()=>saveUserPref("avatarEmoji", e)}

                                        borderRadius: 12,
                                        border: currentEmoji === e ? "3px solid #ffc800" : "3px solid transparent",

                                        cursor: "pointer"

                        <button onClick={onClose} className="w-full mt-5 py-3 rounded-xl font-bold" style={{background: "var(--bg-elevated)", color: "var(--text-primary)"}}>
                            {language==="es"?"Cerrar":"Close"}
                        </button>
                    </div>
                </div>
            );
        }

        function App() {
            const [staffName, setStaffName] = useState(null);
            const [language, setLanguage] = useState("en");
            const [darkMode, setDarkMode] = useState(() => {
                try {
                    const saved = localStorage.getItem("pd_dark");
                    if (saved !== null) return saved === "true";
                    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                } catch(e) { return false; }
            });
            const [userPrefs, setUserPrefs] = useState({});
            const [showProfile, setShowProfile] = useState(false);

            useEffect(() => {
                if (darkMode) document.documentElement.classList.add("dark");
                else document.documentElement.classList.remove("dark");
                try { localStorage.setItem("pd_dark", darkMode); } catch(e){}
            }, [darkMode]);

            // Load user preferences (avatar color)
            useEffect(() => {
                if (!staffName) return;
                const unsub = db.collection("userPrefs").doc(staffName.replace(/\s/g, "_")).onSnapshot(doc => {
                    if (doc.exists) setUserPrefs(doc.data());
                });
                return () => unsub();
            }, [staffName]);

            const saveUserPref = async (key, value) => {
                const updated = { ...userPrefs, [key]: value };
                setUserPrefs(updated);
                try {
                    await db.collection("userPrefs").doc(staffName.replace(/\s/g, "_")).set(updated, { merge: true });
                } catch(e) { console.error(e); }
            };
            const [activeTab, setActiveTab] = useState(() => {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const t = params.get("tab");
                    return t || "home";
                } catch(e) { return "home"; }
            });

            // Listen for service worker messages (notification clicks while app is open)
            useEffect(() => {
                if (!('serviceWorker' in navigator)) return;
                const handler = (event) => {
                    if (event.data?.type === 'notification-click' && event.data?.data) {
                        const d = event.data.data;
                        if (d.type === 'dm' || d.type === 'channel') setActiveTab("messages");
                        else if (d.type === 'schedule' || d.type === 'swap' || d.type === 'openshift' || d.type === 'timeoff') setActiveTab("schedule");
                    }
                };
                navigator.serviceWorker.addEventListener('message', handler);
                return () => navigator.serviceWorker.removeEventListener('message', handler);
            }, []);
            const [staffList, setStaffList] = useState(DEFAULT_STAFF);
            const { isAtPokedoke, checking: geoChecking, error: geoError } = useGeofence();

            // Load staff list from Firestore (falls back to DEFAULT_STAFF)
            useEffect(() => {
                const unsubscribe = db.collection("config").doc("staff").onSnapshot((doc) => {
                    if (doc.exists && doc.data().list) {
                        setStaffList(doc.data().list);
                    }
                });
                return () => unsubscribe();
            }, []);

            // Inventory alert notification
            const [inventoryAlert, setInventoryAlert] = useState(null);
            useEffect(() => {
                const unsub = db.collection("ops").doc("latestAlert").onSnapshot(doc => {
                    if (doc.exists) setInventoryAlert(doc.data());
                });
                return () => unsub();
            }, []);

            // Load today's shifts for shift reminder banner
            const [todayShifts, setTodayShifts] = useState([]);
            useEffect(() => {
                if (!staffName) return;
                const today = new Date();
                const dow = today.getDay() === 0 ? 7 : today.getDay();
                const monday = new Date(today); monday.setDate(today.getDate() - dow + 1);
                const ws = window.fmtLocalDate(monday);
                const dayKeys = ["mon","tue","wed","thu","fri","sat","sun"];
                const todayDayKey = dayKeys[dow - 1];
                const unsubs = ["cwe","kirkwood"].map(loc => {
                    const docId = loc + "_" + ws;
                    return db.collection("schedules").doc(docId).onSnapshot(doc => {
                        if (!doc.exists) { setTodayShifts(prev => prev.filter(s => s._loc !== loc)); return; }
                        const data = doc.data();
                        const useShifts = data.status === "published" ? (data.publishedShifts || data.shifts || []) : [];
                        const mine = useShifts.filter(s => s.employee === staffName && s.day === todayDayKey)
                            .map(s => ({...s, _loc: loc, _locName: loc === "cwe" ? "CWE" : "Kirkwood"}));
                        setTodayShifts(prev => [...prev.filter(s => s._loc !== loc), ...mine]);
                    });
                });
                return () => unsubs.forEach(u => u());
            }, [staffName]);

            const staffIsAdmin = isAdmin(staffName);
            const staffIsOwner = isOwner(staffName);
            const canViewRecipes = canAccessRecipes(staffName, isAtPokedoke);

            // Request push notification permission when staff logs in
            useEffect(() => {
                if (staffName) {
                    requestNotificationPermission(staffName);
                }
            }, [staffName]);

            if (!staffName) {
                return <HomePage onSelectStaff={setStaffName} language={language} setLanguage={setLanguage} staffList={staffList} />;
            }

            return (
                <div className="min-h-screen" style={{background: "var(--bg-primary)"}}>
                    {/* Header */}
                    <div className="bg-gradient-to-r from-poke-800 to-poke-700 text-white p-4 sticky top-0 z-40 shadow-lg wave-bg" style={{paddingBottom: "20px"}}>
