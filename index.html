                    body += `</td></tr>`;
                });
                const win = window.open("","_blank");
                win.document.write(html+body+"</tbody></table></body></html>");
                win.document.close();
                setTimeout(()=>win.print(),300);
            };

            const myShifts = shifts.filter(s => s.employee === staffName);
            const visibleShifts = mgrAccess ? shifts : myShifts;

            return (
                <div className="p-4 pb-24 animate-in">
                    <div className="flex gap-1 rounded-2xl p-1 mb-4 overflow-x-auto sticky z-20" style={{background:"var(--bg-subtle)", top: "0px", scrollbarWidth: "none"}}>
                        {[{id:"view",l:"📅 "+(language==="es"?"Horario":"Schedule")},{id:"mine",l:"👤 "+(language==="es"?"Mis Turnos":"My Shifts")},{id:"avail",l:"🕐 "+(language==="es"?"Disponibilidad":"Availability")},{id:"timeoff",l:"🏖️ "+(language==="es"?"Descanso":"Time Off")},{id:"swaps",l:"🔄 "+(language==="es"?"Cambios":"Swaps")},...(mgrAccess?[{id:"hours",l:"⏱️ "+(language==="es"?"Horas":"Hours")},{id:"actual",l:"📊 "+(language==="es"?"Real":"Actual")},{id:"templates",l:"📋 "+(language==="es"?"Plantillas":"Templates")}]:[]),...(ownerAccess?[{id:"labor",l:"💰 "+(language==="es"?"Costos":"Labor")}]:[])].map(tab=>(
                            <button key={tab.id} onClick={()=>setSchedTab(tab.id)}
                                className={"flex-1 py-2 px-1 rounded-xl text-xs font-bold transition-all whitespace-nowrap "+(schedTab===tab.id?"bg-poke-600 text-white shadow-md":"")} style={schedTab!==tab.id?{color:"var(--text-secondary)"}:{}}>{tab.l}</button>
                        ))}
                    </div>

                    {schedTab === "view" && (
                        <div className="space-y-3">
                            {canToggleLocation ? (
                                <div className="flex gap-2">
                                    {LOCATIONS.map(loc=>(
                                        <button key={loc.id} onClick={()=>setSchedLocation(loc.id)}
                                            className={"flex-1 py-2 rounded-xl text-xs font-bold transition "+(schedLocation===loc.id?"bg-poke-700 text-white":"bg-gray-200 text-gray-600")}>{loc.name}</button>
                                    ))}
                                </div>
                            ) : (
                                <div className="bg-poke-50 rounded-xl p-2 text-center">
                                    <p className="text-sm font-bold text-poke-700">📍 {LOCATIONS.find(l=>l.id===myLocation)?.name || myLocation}</p>
                                </div>
                            )}

                            <div className="flex items-center justify-between bg-white rounded-2xl border border-gray-100 p-3 shadow-sm">
                                <button onClick={()=>setWeekOffset(weekOffset-1)} className="w-9 h-9 rounded-xl bg-gray-100 flex items-center justify-center font-bold text-gray-600">←</button>
                                <div className="text-center">
                                    <p className="font-bold text-gray-800 text-sm">{language==="es"?"Semana del":"Week of"} {new Date(weekStart+"T12:00:00").toLocaleDateString(language==="es"?"es-US":"en-US",{month:"short",day:"numeric",year:"numeric"})}</p>
                                    {schedStatus==="published"&&hasUnpublishedChanges&&mgrAccess?(
                                        <p className="text-xs font-bold text-orange-600">⚠️ {language==="es"?"Publicado con cambios sin publicar":"Published — Unpublished Changes"}</p>
                                    ):(
                                        <p className={"text-xs font-bold "+(schedStatus==="published"?"text-green-600":"text-yellow-600")}>{schedStatus==="published"?(language==="es"?"✅ Publicado":"✅ Published"):(language==="es"?"📝 Borrador":"📝 Draft")}</p>
                                    )}
                                </div>
                                <button onClick={()=>setWeekOffset(weekOffset+1)} className="w-9 h-9 rounded-xl bg-gray-100 flex items-center justify-center font-bold text-gray-600">→</button>
                            </div>

                            {/* Unpublished changes banner for managers */}
                            {schedStatus==="published"&&hasUnpublishedChanges&&mgrAccess&&(
                                <div className="bg-orange-50 border border-orange-200 rounded-2xl p-3">
                                    <p className="font-bold text-orange-800 text-sm">⚠️ {language==="es"?"Cambios Sin Publicar":"Unpublished Changes"}</p>
                                    <p className="text-xs text-orange-700 mt-1">{language==="es"?"El equipo aún ve la versión publicada. Publica de nuevo para que vean tus cambios, o descarta para volver a la versión publicada.":"Staff still see the published version. Publish again to push your changes, or revert to discard them."}</p>
                                    <div className="flex gap-2 mt-2">
                                        <button onClick={publishSchedule} className="flex-1 py-2 bg-green-600 text-white rounded-xl text-xs font-bold active:scale-95">✅ {language==="es"?"Republicar":"Republish"}</button>
                                        <button onClick={revertChanges} className="flex-1 py-2 bg-white border border-orange-300 text-orange-700 rounded-xl text-xs font-bold active:scale-95">↩️ {language==="es"?"Descartar":"Revert"}</button>
                                    </div>
                                </div>
                            )}

                            {mgrAccess && (
                                <div className="grid grid-cols-2 gap-2">
                                    {schedStatus==="draft"?(
                                        <button onClick={publishSchedule} className="py-2 bg-green-600 text-white rounded-xl text-xs font-bold active:scale-95">✅ {language==="es"?"Publicar":"Publish"}</button>
                                    ):hasUnpublishedChanges?(
                                        <button onClick={publishSchedule} className="py-2 bg-orange-600 text-white rounded-xl text-xs font-bold active:scale-95">⚠️ {language==="es"?"Republicar":"Republish"}</button>
                                    ):(
                                        <button onClick={unpublishSchedule} className="py-2 bg-yellow-500 text-white rounded-xl text-xs font-bold active:scale-95">📝 {language==="es"?"Despublicar":"Unpublish"}</button>
                                    )}
                                    <button onClick={copyWeek} className="py-2 bg-poke-600 text-white rounded-xl text-xs font-bold active:scale-95">📋 {language==="es"?"Copiar →":"Copy →"}</button>
                                    <button onClick={autoSchedule} className="py-2 bg-purple-600 text-white rounded-xl text-xs font-bold active:scale-95">✨ {language==="es"?"Auto-generar":"Auto-Generate"}</button>
                                    <button onClick={printSchedule} className="py-2 bg-gray-700 text-white rounded-xl text-xs font-bold active:scale-95">🖨️ {language==="es"?"Imprimir":"Print"}</button>
                                    <button onClick={()=>{setTempCloseTime(closeTime);setShowSettings(true);}} className="col-span-2 py-2 bg-white border border-gray-200 text-gray-700 rounded-xl text-xs font-bold active:scale-95">⚙️ {language==="es"?"Ajustes — Hora de Cierre":"Settings — Close Time"}: {fmtTime(closeTime)}</button>
                                </div>
                            )}

                            {/* ========== DESKTOP GRID VIEW (managers, screens >= 1024px) ========== */}
                            {isDesktop && mgrAccess && (() => {
                                const locStaff = staffList.filter(s=>s.location===schedLocation||s.location==="all");
                                const empsWithShifts = new Set(shifts.filter(s=>s.employee!=="__OPEN__").map(s=>s.employee));
                                const visibleEmps = showAllEmployees ? locStaff : locStaff.filter(s=>empsWithShifts.has(s.name));
                                const openShifts = shifts.filter(s=>s.employee==="__OPEN__");

                                return (
                                    <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                                        {/* Toolbar */}
                                        <div className="p-3 bg-gradient-to-r from-poke-50 to-white border-b flex items-center justify-between flex-wrap gap-2">
                                            <p className="font-bold text-poke-700 text-sm">🗓️ {language==="es"?"Vista de Cuadrícula":"Grid View"} — {LOCATIONS.find(l=>l.id===schedLocation)?.name}</p>
                                            <div className="flex items-center gap-2">
                                                <button onClick={()=>setShowAllEmployees(!showAllEmployees)} className={"text-xs font-bold px-3 py-1.5 rounded-lg "+(showAllEmployees?"bg-poke-600 text-white":"bg-gray-200 text-gray-600")}>
                                                    {showAllEmployees?(language==="es"?"👥 Todos los empleados":"👥 All Employees"):(language==="es"?"📋 Solo con turnos":"📋 With Shifts Only")}
                                                </button>
                                                <span className="text-xs text-gray-400">{visibleEmps.length} {language==="es"?"empleados":"staff"}</span>
                                            </div>
                                        </div>

                                        {/* Grid */}
                                        <div className="overflow-x-auto">
                                            <table style={{width: "100%", borderCollapse: "separate", borderSpacing: 0}}>
                                                <thead>
                                                    <tr style={{background: "var(--bg-subtle)"}}>
                                                        <th style={{position: "sticky", left: 0, background: "var(--bg-subtle)", padding: "10px 12px", textAlign: "left", fontSize: 11, fontWeight: 700, color: "var(--text-muted)", borderRight: "1px solid var(--border-subtle)", minWidth: 180, zIndex: 1}}>
                                                            {language==="es"?"EMPLEADO":"EMPLOYEE"}
                                                        </th>
                                                        {DAY_KEYS.map((dk,di)=>(
                                                            <th key={dk} style={{padding: "10px 8px", textAlign: "center", fontSize: 11, fontWeight: 700, color: "var(--text-muted)", borderRight: "1px solid var(--border-subtle)"}}>
                                                                <div>{DAYS[di].slice(0,3).toUpperCase()}</div>
                                                                <div style={{fontSize: 10, fontWeight: 500, color: "var(--text-muted)", marginTop: 2}}>{getDateForDay(di)}</div>
                                                            </th>
                                                        ))}
                                                        <th style={{padding: "10px 8px", textAlign: "center", fontSize: 11, fontWeight: 700, color: "var(--text-muted)", minWidth: 60}}>
                                                            {language==="es"?"HRS":"HRS"}
                                                        </th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {/* Open shifts row */}
                                                    {openShifts.length > 0 && (
                                                        <tr>
                                                            <td style={{position: "sticky", left: 0, background: "#dbeafe", padding: "8px 12px", borderRight: "1px solid var(--border-subtle)", borderBottom: "1px solid var(--border-subtle)", zIndex: 1}}>
                                                                <div style={{fontWeight: 700, fontSize: 13, color: "#1e40af"}}>🆕 {language==="es"?"Turnos Abiertos":"Open Shifts"}</div>
                                                                <div style={{fontSize: 10, color: "#3b82f6"}}>{openShifts.length} {language==="es"?"sin asignar":"unassigned"}</div>
                                                            </td>
                                                            {DAY_KEYS.map(dk=>{
                                                                const cellShifts = openShifts.filter(s=>s.day===dk).sort((a,b)=>(a.startTime||"").localeCompare(b.startTime||""));
                                                                return (
                                                                    <td key={dk}
                                                                        onDragOver={(e)=>{e.preventDefault();e.currentTarget.style.background="#dbeafe";}}
                                                                        onDragLeave={(e)=>{e.currentTarget.style.background="";}}
                                                                        onDrop={(e)=>{e.preventDefault();e.currentTarget.style.background="";if(draggedShift)moveShift(draggedShift.id,dk);setDraggedShift(null);}}
                                                                        onClick={()=>setGridAddCell({employee:"__OPEN__", dayKey:dk})}
                                                                        style={{padding: 4, borderRight: "1px solid var(--border-subtle)", borderBottom: "1px solid var(--border-subtle)", verticalAlign: "top", minHeight: 60, background: "#eff6ff", cursor: "pointer"}}>
                                                                        {cellShifts.map(shift=>(
                                                                            <div key={shift.id}
                                                                                draggable
                                                                                onDragStart={(e)=>{e.stopPropagation();setDraggedShift(shift);}}
                                                                                onClick={(e)=>{e.stopPropagation();openEditShift(shift);}}
                                                                                style={{
                                                                                    background: "#3b82f6", color: "white",
                                                                                    padding: "4px 6px", borderRadius: 6, fontSize: 11,
                                                                                    marginBottom: 2, cursor: "move", fontWeight: 600
                                                                                }}>
                                                                                {fmtShiftRange(shift)}
                                                                                {shift.role && <div style={{fontSize: 10, opacity: 0.9, fontWeight: 400}}>{shift.role}</div>}
                                                                            </div>
                                                                        ))}
                                                                    </td>
                                                                );
                                                            })}
                                                            <td style={{padding: 4, fontSize: 11, color: "#3b82f6", textAlign: "center", borderBottom: "1px solid var(--border-subtle)"}}>—</td>
                                                        </tr>
                                                    )}

                                                    {/* Employee rows */}
                                                    {visibleEmps.map(emp=>{
                                                        const empShifts = shifts.filter(s=>s.employee===emp.name);
                                                        const totalHours = empShifts.reduce((sum,s)=>sum+calcHours(s.startTime,s.endTime),0);
                                                        const isOT = totalHours > 40;
                                                        const avail = allAvailability.find(a=>a.name===emp.name);
                                                        return (
                                                            <tr key={emp.id}>
                                                                <td style={{position: "sticky", left: 0, background: "var(--bg-card)", padding: "8px 12px", borderRight: "1px solid var(--border-subtle)", borderBottom: "1px solid var(--border-subtle)", zIndex: 1}}>
                                                                    <div style={{display: "flex", alignItems: "center", gap: 8}}>
                                                                        <Avatar name={emp.name} prefs={{}} size={28} />
                                                                        <div style={{flex: 1, minWidth: 0}}>
                                                                            <div style={{fontWeight: 600, fontSize: 13, color: "var(--text-primary)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"}}>{emp.name}</div>
                                                                            <div style={{fontSize: 10, color: "var(--text-muted)"}}>{emp.role}</div>
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                                {DAY_KEYS.map((dk,dayIdx)=>{
                                                                    const cellShifts = empShifts.filter(s=>s.day===dk).sort((a,b)=>(a.startTime||"").localeCompare(b.startTime||""));
                                                                    const hasConflict = hasTimeOffConflict(emp.name, dayIdx);
                                                                    const empTO = getEmpTimeOffForDay(emp.name, dayIdx);
                                                                    const hasPendingTO = empTO && empTO.status === "pending";
                                                                    const dayAvail = avail?.days?.[dk];
                                                                    const isAvailableDay = dayAvail?.available;
                                                                    return (
                                                                        <td key={dk}
                                                                            onDragOver={(e)=>{e.preventDefault();e.currentTarget.style.background="#ecfeff";}}
                                                                            onDragLeave={(e)=>{e.currentTarget.style.background="";}}
                                                                            onDrop={(e)=>{e.preventDefault();e.currentTarget.style.background="";if(draggedShift){const updated=shifts.map(s=>s.id===draggedShift.id?{...s,day:dk,employee:emp.name}:s);setShifts(updated);writeDraft(updated);}setDraggedShift(null);}}
                                                                            onClick={()=>cellShifts.length===0&&setGridAddCell({employee:emp.name, dayKey:dk})}
                                                                            title={empTO?(empTO.status==="approved"?"Approved time off":"PENDING time off request") + (empTO.reason?": "+empTO.reason:""):""}
                                                                            style={{
                                                                                padding: 4,
                                                                                borderRight: "1px solid var(--border-subtle)",
                                                                                borderBottom: "1px solid var(--border-subtle)",
                                                                                verticalAlign: "top",
                                                                                minHeight: 60,
                                                                                background: hasConflict ? "#fef2f2" : hasPendingTO ? "#fef3c7" : isAvailableDay === false ? "#fefce8" : "transparent",
                                                                                cursor: cellShifts.length === 0 ? "pointer" : "default",
                                                                                position: "relative"
                                                                            }}>
                                                                            {hasConflict && cellShifts.length===0 && (
                                                                                <div style={{fontSize: 9, color: "#dc2626", textAlign: "center", padding: 4, fontWeight: 700, lineHeight: 1.3}}>
                                                                                    ⛔ {language==="es"?"DESCANSO APROBADO":"TIME OFF"}
                                                                                </div>
                                                                            )}
                                                                            {hasPendingTO && cellShifts.length===0 && (
                                                                                <div style={{fontSize: 9, color: "#92400e", textAlign: "center", padding: 4, fontWeight: 700, lineHeight: 1.3}}>
                                                                                    🏖️ {language==="es"?"DESCANSO PENDIENTE":"TIME OFF PENDING"}
                                                                                </div>
                                                                            )}
                                                                            {isAvailableDay === false && !hasConflict && !hasPendingTO && cellShifts.length===0 && (
                                                                                <div style={{fontSize: 9, color: "#a16207", textAlign: "center", padding: 4, fontWeight: 700}}>❌ {language==="es"?"NO DISP":"UNAVAIL"}</div>
                                                                            )}
                                                                            {cellShifts.map(shift=>(
                                                                                <div key={shift.id}
                                                                                    draggable
                                                                                    onDragStart={(e)=>{e.stopPropagation();setDraggedShift(shift);}}
                                                                                    onClick={(e)=>{e.stopPropagation();openEditShift(shift);}}
                                                                                    style={{
                                                                                        background: shift.isBD ? "#fbbf24" : isOT ? "#fb923c" : hasConflict ? "#ef4444" : "#0891b2",
                                                                                        color: "white",
                                                                                        padding: "4px 6px",
                                                                                        borderRadius: 6,
                                                                                        fontSize: 11,
                                                                                        marginBottom: 2,
                                                                                        cursor: "move",
                                                                                        fontWeight: 600,
                                                                                        boxShadow: "0 1px 2px rgba(0,0,0,0.1)"
                                                                                    }}>
                                                                                    {fmtShiftRange(shift)}
                                                                                    {shift.role && <div style={{fontSize: 10, opacity: 0.9, fontWeight: 400}}>{shift.role}</div>}
                                                                                </div>
                                                                            ))}
                                                                            {/* Plus icon on hover (CSS will show it) */}
                                                                            {cellShifts.length === 0 && !hasConflict && isAvailableDay !== false && (
                                                                                <div style={{textAlign: "center", color: "#cbd5e0", fontSize: 18, padding: "8px 0"}}>+</div>
                                                                            )}
                                                                        </td>
                                                                    );
                                                                })}
                                                                <td style={{padding: "8px 4px", textAlign: "center", fontSize: 13, fontWeight: 700, color: isOT ? "#ea580c" : "var(--text-primary)", borderBottom: "1px solid var(--border-subtle)"}}>
                                                                    {totalHours.toFixed(1)}
                                                                    {isOT && <div style={{fontSize: 9, color: "#ea580c"}}>OT</div>}
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}

                                                    {visibleEmps.length === 0 && (
                                                        <tr>
                                                            <td colSpan={9} style={{padding: 40, textAlign: "center", color: "var(--text-muted)", fontSize: 14}}>
                                                                {showAllEmployees ? (language==="es"?"Sin empleados en esta ubicación":"No staff at this location") : (language==="es"?"Sin turnos esta semana — cambia a 'Todos los empleados' para programar":"No shifts this week — switch to 'All Employees' to schedule")}
                                                            </td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>

                                        <div className="p-3 border-t border-gray-100 bg-gray-50 text-xs text-gray-500 flex flex-wrap gap-4">
                                            <span><span style={{display: "inline-block", width: 10, height: 10, background: "#0891b2", borderRadius: 3, marginRight: 4, verticalAlign: "middle"}}></span>{language==="es"?"Turno":"Shift"}</span>
                                            <span><span style={{display: "inline-block", width: 10, height: 10, background: "#3b82f6", borderRadius: 3, marginRight: 4, verticalAlign: "middle"}}></span>{language==="es"?"Abierto":"Open"}</span>
                                            <span><span style={{display: "inline-block", width: 10, height: 10, background: "#fbbf24", borderRadius: 3, marginRight: 4, verticalAlign: "middle"}}></span>BD</span>
                                            <span><span style={{display: "inline-block", width: 10, height: 10, background: "#fb923c", borderRadius: 3, marginRight: 4, verticalAlign: "middle"}}></span>OT (40h+)</span>
                                            <span><span style={{display: "inline-block", width: 10, height: 10, background: "#fef2f2", border: "1px solid #dc2626", borderRadius: 3, marginRight: 4, verticalAlign: "middle"}}></span>⛔ {language==="es"?"Descanso Aprobado":"Time Off (Approved)"}</span>
                                            <span><span style={{display: "inline-block", width: 10, height: 10, background: "#fef3c7", border: "1px solid #f59e0b", borderRadius: 3, marginRight: 4, verticalAlign: "middle"}}></span>🏖️ {language==="es"?"Descanso Pendiente":"Time Off (Pending)"}</span>
                                            <span style={{marginLeft: "auto"}}>💡 {language==="es"?"Click celda para agregar · Click turno para editar · Arrastra para mover":"Click cell to add · Click shift to edit · Drag to move"}</span>
                                        </div>
                                    </div>
                                );
                            })()}

                            {/* ========== MOBILE/STAFF DAY CARDS (or desktop when not manager) ========== */}
                            {(!isDesktop || !mgrAccess) && DAY_KEYS.map((dayKey,dayIdx) => {
                                const dayShifts = visibleShifts.filter(s=>s.day===dayKey).sort((a,b)=>(a.startTime||"").localeCompare(b.startTime||""));
                                const dayTimeOff = mgrAccess ? getTimeOffForDay(dayIdx) : getTimeOffForDay(dayIdx).filter(r=>r.employee===staffName);
                                return (
                                    <div key={dayKey} className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden"
                                         onDragOver={mgrAccess?(e)=>{e.preventDefault();e.currentTarget.classList.add("bg-poke-50");}:undefined}
                                         onDragLeave={mgrAccess?(e)=>{e.currentTarget.classList.remove("bg-poke-50");}:undefined}
                                         onDrop={mgrAccess?(e)=>{e.preventDefault();e.currentTarget.classList.remove("bg-poke-50");if(draggedShift)moveShift(draggedShift.id,dayKey);setDraggedShift(null);}:undefined}>
                                        <div className="p-3 bg-gradient-to-r from-poke-50 to-white border-b flex justify-between items-center">
                                            <div>
                                                <span className="font-bold text-poke-700 text-sm">{DAYS[dayIdx]}</span>
                                                <span className="text-xs text-gray-400 ml-2">{getDateForDay(dayIdx)}</span>
                                            </div>
                                            <span className="text-xs text-gray-400">{dayShifts.length} {language==="es"?"turnos":"shifts"}</span>
                                        </div>

                                        {/* Time-off requests for this day */}
                                        {dayTimeOff.length > 0 && (
                                            <div style={{background: "#fef3c7", borderBottom: "1px solid #fde68a", padding: "8px 12px"}}>
                                                {dayTimeOff.map(req => (
                                                    <div key={req.id} className="flex items-start justify-between gap-2 py-1">
                                                        <div className="flex-1 min-w-0">
                                                            <p className="text-xs font-bold" style={{color: "#92400e"}}>
                                                                🏖️ {req.employee} — {language==="es"?"Solicitud de descanso":"Time Off Request"}
                                                            </p>
                                                            {req.reason && <p className="text-xs italic mt-0.5" style={{color: "#a16207"}}>"{req.reason}"</p>}
                                                        </div>
                                                        <span className="text-xs font-bold px-2 py-0.5 rounded flex-shrink-0" style={req.status === "approved" ? {background: "#86efac", color: "#14532d"} : {background: "#fde68a", color: "#854d0e"}}>
                                                            {req.status === "approved" ? "✓ "+(language==="es"?"Aprobado":"Approved") : "⏳ "+(language==="es"?"Pendiente":"Pending")}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {/* Manager Day Notes */}
                                        {(dayNotes[dayKey] || mgrAccess) && (
                                            <div style={{background: dayNotes[dayKey] ? "#eff6ff" : "transparent", borderBottom: dayNotes[dayKey] ? "1px solid #bfdbfe" : "none", padding: dayNotes[dayKey] || mgrAccess ? "8px 12px" : 0}}>
                                                {dayNotes[dayKey] && !mgrAccess && (
                                                    <p className="text-xs" style={{color:"#1e40af"}}>📌 {dayNotes[dayKey]}</p>
                                                )}
                                                {mgrAccess && (
                                                    <div className="flex items-center gap-2">
                                                        <span style={{fontSize:12}}>📌</span>
                                                        <input type="text" value={dayNotes[dayKey]||""} onChange={e=>setDayNotes(prev=>({...prev,[dayKey]:e.target.value}))}
                                                            onBlur={e=>saveDayNote(dayKey, e.target.value)}
                                                            placeholder={language==="es"?"Nota del día...":"Day note..."}
                                                            className="flex-1 text-xs px-2 py-1 border rounded-lg" style={{background:"white",borderColor:"#bfdbfe",color:"#1e40af"}}/>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <div className="divide-y divide-gray-50">
                                            {dayShifts.length===0&&!mgrAccess&&(
                                                <p className="p-3 text-sm text-gray-400 text-center">{language==="es"?"Sin turnos":"No shifts"}</p>
                                            )}
                                            {dayShifts.map(shift=>{
                                                const isMine = shift.employee===staffName;
                                                const isOpen = shift.employee==="__OPEN__";
                                                const hasConflict = !isOpen && hasTimeOffConflict(shift.employee, dayIdx);
                                                const availStatus = !isOpen && mgrAccess ? isAvailable(shift.employee, dayKey, shift.startTime, shift.endTime) : null;
                                                const empHours = !isOpen ? getEmpWeeklyHours(shift.employee) : 0;
                                                const isOT = empHours > 40;
                                                return (
                                                    <div key={shift.id}
                                                         draggable={mgrAccess&&!isOpen}

                // Pokedoke Location Coordinates
        const POKEDOKE_LOCATIONS = [
            { name: "Central West End", lat: 38.6396437, lng: -90.2625462 },
            { name: "Kirkwood", lat: 38.580115, lng: -90.4058729 }
        ];
        const GEOFENCE_RADIUS_FEET = 500;

        // Haversine distance in feet
        function getDistanceFeet(lat1, lng1, lat2, lng2) {
            const R = 20902231; // Earth radius in feet
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function isWithinGeofence(lat, lng) {
            return POKEDOKE_LOCATIONS.some(loc =>
                getDistanceFeet(lat, lng, loc.lat, loc.lng) <= GEOFENCE_RADIUS_FEET
            );
        }

        // Geofence hook
        function useGeofence() {
            const [isAtPokedoke, setIsAtPokedoke] = useState(false);
            const [checking, setChecking] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!navigator.geolocation) {
                    setError("noGeo");
                    setChecking(false);
                    return;
                }

                const watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        const inside = isWithinGeofence(pos.coords.latitude, pos.coords.longitude);
                        setIsAtPokedoke(inside);
                        setChecking(false);
                        setError(null);
                    },
                    (err) => {
                        setError(err.code === 1 ? "denied" : "unavailable");
                        setChecking(false);
                    },
                    { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 }
                );

                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            return { isAtPokedoke, checking, error };
        }

                    try {

                        setHistoryDates(dates);

                    setLoading(false);
                };
                fetchHistory();

            useEffect(() => {
                if (!selectedDate) return;
                const fetchDay = async () => {
                    try {
                        // Prefer the _saved version (has completed checks before reset)
                        const savedDoc = await db.collection("checklistHistory").doc(selectedDate + "_saved").get();
                        if (savedDoc.exists) { setDayData(savedDoc.data()); return; }
                        const doc = await db.collection("checklistHistory").doc(selectedDate).get();
                        if (doc.exists) setDayData(doc.data());
                        else setDayData(null);
                    } catch (err) { console.error("Error loading day:", err); }
                };
                fetchDay();
            }, [selectedDate]);

            const formatDate = (dateStr) => {
                const d = new Date(dateStr + "T12:00:00");
                return d.toLocaleDateString(language === "es" ? "es-US" : "en-US", { weekday: "short", month: "short", day: "numeric" });
            };

            const renderHistoryPeriod = (period) => {
                if (!dayData || !dayData.customTasks) return null;
                const tasks = dayData.customTasks[historySide]?.[period.id] || [];
                if (tasks.length === 0) return null;
                const checks = dayData.checks || {};

                let totalItems = 0, doneItems = 0;
                tasks.forEach(task => {
                    if (task.subtasks && task.subtasks.length > 0) {
                        totalItems += task.subtasks.length;
                        doneItems += task.subtasks.filter(s => checks[s.id]).length;
                    } else {
                        totalItems += 1;
                        doneItems += checks[task.id] ? 1 : 0;
                    }
                    if (task.requirePhoto) { totalItems += 1; doneItems += checks[task.id + "_photo"] ? 1 : 0; }
                });

                const allDone = totalItems > 0 && doneItems === totalItems;

                return (
                    <div key={period.id} className="mb-3">

                        </div>
                        <div className="space-y-1">
                            {tasks.map((task, idx) => {
                                const hasSubtasks = task.subtasks && task.subtasks.length > 0;
                                const taskDone = hasSubtasks
                                    ? task.subtasks.every(s => checks[s.id])
                                    : !!checks[task.id];
                                const photoDone = task.requirePhoto ? !!checks[task.id + "_photo"] : true;
                                const fullyDone = taskDone && photoDone;
                                const photoUrl = checks[task.id + "_photo"];

                                return (
                                    <div key={idx} className={`p-2 rounded-lg text-sm ${fullyDone ? "bg-green-50" : "bg-red-50"}`}>
                                        <div className="flex items-center gap-2">
                                            <span className="text-base">{fullyDone ? "✅" : "❌"}</span>
                                            <span className={fullyDone ? "text-gray-700" : "text-red-700 font-medium"}>
                                                {task.task.includes("\n") ? task.task.split("\n").map((line, li) => (
                                                    <span key={li}>{li === 0 ? line : <><br/><span className="font-normal text-xs text-gray-500">{line}</span></>}</span>
                                                )) : task.task}
                                            </span>
                                        </div>
                                        {hasSubtasks && (
                                            <div className="ml-7 mt-1 space-y-0.5">
                                                {task.subtasks.map((sub, si) => (
                                                    <div key={si} className="flex items-center gap-1.5 text-xs">
                                                        <span>{checks[sub.id] ? "✅" : "⬜"}</span>
                                                        <span className={checks[sub.id] ? "text-gray-600" : "text-red-600"}>{sub.task}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        {task.requirePhoto && (
                                            <div className="ml-7 mt-1">
                                                {photoUrl ? (
                                                    <button onClick={() => setExpandedPhoto(expandedPhoto === task.id ? null : task.id)}
                                                        className="text-xs font-bold text-poke-700 flex items-center gap-1">
                                                        📸 {expandedPhoto === task.id
                                                            ? (language === "es" ? "Ocultar foto" : "Hide photo")
                                                            : (language === "es" ? "Ver foto" : "View photo")}
                                                    </button>
                                                ) : (
                                                    <span className="text-xs text-red-400 font-medium">📸 {language === "es" ? "Foto no tomada" : "Photo not taken"}</span>
                                                )}
                                                {expandedPhoto === task.id && photoUrl && (
                                                    <img src={photoUrl} alt="Task photo" className="mt-1 rounded-lg border border-gray-200 max-w-full" style={{ maxHeight: "200px" }} />
                                                )}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            if (loading) return <div className="text-center text-gray-500 py-4">{language === "es" ? "Cargando..." : "Loading..."}</div>;

            if (historyDates.length === 0) {
                return (
                    <div className="bg-gray-50 rounded-lg p-4 text-center text-gray-500">
                        <p className="text-sm">{language === "es"
                            ? "Aún no hay historial de listas. El historial comenzará a guardarse cuando el equipo use las listas."
                            : "No checklist history yet. History will start saving when the team uses the checklists."}</p>
                    </div>
                );
            }

            return (
                <div>
                    {/* Date picker */}
                    <div className="flex gap-2 overflow-x-auto pb-2 mb-3" style={{ scrollbarWidth: "none" }}>
                        {historyDates.map(date => (
                            <button key={date} onClick={() => setSelectedDate(date)}
                                className={`flex-shrink-0 px-3 py-2 rounded-lg text-xs font-bold transition ${selectedDate === date
                                    ? "bg-poke-700 text-white"
                                    : "bg-gray-100 text-gray-600 hover:bg-poke-50"}`}>
                                {formatDate(date)}
                            </button>
                        ))}
                    </div>

                    {/* FOH / BOH toggle */}
                    <div className="flex gap-2 mb-4">
                        <button onClick={() => setHistorySide("FOH")}
                            className={`flex-1 py-2 rounded-lg text-xs font-bold transition ${historySide === "FOH" ? "bg-poke-700 text-white" : "bg-gray-100 text-gray-600"}`}>
                            FOH
                        </button>
                        <button onClick={() => setHistorySide("BOH")}
                            className={`flex-1 py-2 rounded-lg text-xs font-bold transition ${historySide === "BOH" ? "bg-poke-700 text-white" : "bg-gray-100 text-gray-600"}`}>
                            BOH
                        </button>
                    </div>

                    {selectedDate && dayData && (
                        <div>
                            <p className="text-xs text-gray-500 mb-3">
                                {language === "es" ? "Última actualización" : "Last updated"}: {new Date(dayData.date).toLocaleString()}
                            </p>
                            {TIME_PERIODS.map(p => renderHistoryPeriod(p))}
                            {TIME_PERIODS.every(p => {
                                const tasks = dayData.customTasks?.[historySide]?.[p.id] || [];
                                return tasks.length === 0;
                            }) && (
                                <p className="text-center text-gray-400 text-sm py-4">{language === "es" ? "Sin tareas para este lado" : "No tasks for this side"}</p>
                            )}
                        </div>
                    )}

                    {selectedDate && !dayData && (
                        <p className="text-center text-gray-400 text-sm py-4">{language === "es" ? "Sin datos para este día" : "No data for this day"}</p>
                    )}
                </div>
            );
        }

        // Inventory History Component (Admin only)
        function InventoryHistory({ language }) {
            const [historyDates, setHistoryDates] = useState([]);
            const [selectedDate, setSelectedDate] = useState(null);
            const [dayData, setDayData] = useState(null);
            const [prevData, setPrevData] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchHistory = async () => {
                    try {
                        const snapshot = await db.collection("inventoryHistory").get();
                        const dates = snapshot.docs.map(doc => doc.id).sort().reverse().slice(0, 30);
                        setHistoryDates(dates);
                        if (dates.length > 0) setSelectedDate(dates[0]);
                    } catch (err) { console.error("Error loading inventory history:", err); }
                    setLoading(false);
                };
                fetchHistory();
            }, []);

            // Load selected day + previous day for comparison
            useEffect(() => {
                if (!selectedDate) return;
                const fetchDay = async () => {
                    try {
                        const doc = await db.collection("inventoryHistory")
                            .doc(selectedDate).get();
                        if (doc.exists) setDayData(doc.data());
                        else setDayData(null);

                        // Find previous day in history
                        const idx = historyDates.indexOf(selectedDate);
                        if (idx < historyDates.length - 1) {
                            const prevDoc = await db.collection("inventoryHistory")
                                .doc(historyDates[idx + 1]).get();
                            if (prevDoc.exists) setPrevData(prevDoc.data());
                            else setPrevData(null);
                        } else {
                            setPrevData(null);
                        }
                    } catch (err) { console.error("Error loading day:", err); }
                };
                fetchDay();
            }, [selectedDate, historyDates]);

            const formatDate = (dateStr) => {
                // Keys are like "2026-04-11_143022"
                const datePart = dateStr.split("_")[0];
                const timePart = dateStr.split("_")[1];
                const d = new Date(datePart + "T12:00:00");
                const dateLabel = d.toLocaleDateString(language === "es" ? "es-US" : "en-US", { weekday: "short", month: "short", day: "numeric" });
                if (timePart) {
                    const h = timePart.slice(0, 2);
                    const m = timePart.slice(2, 4);
                    const hr = parseInt(h);
                    const ampm = hr >= 12 ? "pm" : "am";
                    const hr12 = hr % 12 || 12;
                    return `${dateLabel} ${hr12}:${m}${ampm}`;
                }
                return dateLabel;
            };

            const printInventory = () => {
                if (!dayData || !dayData.items) return;
                const dateLabel = formatDate(selectedDate);
                let html = `<!DOCTYPE html><html><head><title>Pokedoke Inventory - ${dateLabel}</title>
                    <style>
                        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; color: #222; }
                        h1 { font-size: 20px; margin-bottom: 4px; }
                        .subtitle { font-size: 12px; color: #666; margin-bottom: 16px; }
                        table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
                        th { background: #d9ecdb; text-align: left; padding: 6px 10px; font-size: 13px; border: 1px solid #ccc; }
                        td { padding: 5px 10px; font-size: 12px; border: 1px solid #ddd; }
                        .count { text-align: right; font-weight: bold; width: 50px; }
                        .diff-pos { color: green; font-size: 11px; }
                        .diff-neg { color: red; font-size: 11px; }
                        .supplier { color: #999; font-size: 11px; }
                        @media print { body { padding: 0; } }
                    </style></head><body>`;
                html += `<h1>🐟 Pokedoke — Inventory Count</h1>`;
                html += `<div class="subtitle">${dateLabel} • ${language === "es" ? "Última actualización" : "Last updated"}: ${new Date(dayData.date).toLocaleString()}</div>`;

                dayData.items.forEach(cat => {
                    html += `<table><tr><th colspan="3">${cat.category}</th></tr>`;
                    cat.items.forEach(item => {
                        const count = dayData.counts?.[item.id] || 0;
                        const prevCount = prevData?.counts?.[item.id];
                        const diff = prevCount !== undefined ? count - prevCount : null;
                        const name = language === "es" && item.nameEs ? item.nameEs : item.name;
                        const supplierStr = item.supplier ? ` <span class="supplier">(${item.supplier})</span>` : "";
                        let diffStr = "";
                        if (diff !== null && diff !== 0) {
                            diffStr = diff > 0
                                ? ` <span class="diff-pos">+${diff}</span>`
                                : ` <span class="diff-neg">${diff}</span>`;
                        }
                        html += `<tr><td>${name}${supplierStr}</td><td class="count">${count}</td><td style="width:40px">${diffStr}</td></tr>`;
                    });
                    html += `</table>`;
                });

                html += `</body></html>`;
                const win = window.open("", "_blank");
                win.document.write(html);
                win.document.close();
                win.focus();
                setTimeout(() => win.print(), 300);
            };

            if (loading) return <div className="text-center text-gray-500 py-4">{language === "es" ? "Cargando..." : "Loading..."}</div>;

            if (historyDates.length === 0) {
                return (
                    <div className="bg-gray-50 rounded-lg p-4 text-center text-gray-500">
                        <p className="text-sm">{language === "es"
                            ? "Aún no hay historial de inventario. Comenzará a guardarse cuando se actualicen los conteos."
                            : "No inventory history yet. It will start saving when counts are updated."}</p>
                    </div>
                );
            }

            return (
                <div>
                    <div className="flex gap-2 overflow-x-auto pb-2 mb-4" style={{ scrollbarWidth: "none" }}>
                        {historyDates.map(date => (
                            <button key={date} onClick={() => setSelectedDate(date)}
                                className={`flex-shrink-0 px-3 py-2 rounded-lg text-xs font-bold transition ${selectedDate === date
                                    ? "bg-poke-700 text-white"
                                    : "bg-gray-100 text-gray-600 hover:bg-poke-50"}`}>
                                {formatDate(date)}
                            </button>
                        ))}
                    </div>

                    {selectedDate && dayData && dayData.items && (
                        <div className="space-y-4">
                            <div className="flex justify-between items-center">
                                <p className="text-xs text-gray-500">
                                    {language === "es" ? "Última actualización" : "Last updated"}: {new Date(dayData.date).toLocaleString()}
                                </p>
                                <button onClick={printInventory}
                                    className="px-3 py-1.5 bg-poke-100 text-poke-700 rounded-lg text-xs font-bold hover:bg-poke-200 transition">
                                    🖨️ {language === "es" ? "Imprimir" : "Print"}
                                </button>
                            </div>
                            {dayData.items.map((cat, catIdx) => (
                                <div key={catIdx} className="bg-white rounded-lg border border-gray-200 overflow-hidden">
                                    <div className="p-2 bg-poke-50 border-b border-gray-200">
                                        <h4 className="font-bold text-sm text-poke-800">{cat.category}</h4>
                                    </div>
                                    <div className="divide-y divide-gray-100">
                                        {cat.items.map((item, idx) => {
                                            const count = dayData.counts?.[item.id] || 0;
                                            const prevCount = prevData?.counts?.[item.id];
                                            const diff = prevCount !== undefined ? count - prevCount : null;

                                            return (
                                                <div key={idx} className="flex items-center justify-between px-3 py-2 text-sm">
                                                    <div className="flex-1">
                                                        <span className="text-gray-800">{language === "es" && item.nameEs ? item.nameEs : item.name}</span>
                                                        {item.supplier && <span className="text-xs text-gray-400 ml-2">({item.supplier})</span>}
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <span className="font-bold text-gray-800 w-8 text-right">{count}</span>
                                                        {diff !== null && diff !== 0 && (
                                                            <span className={`text-xs font-bold px-1.5 py-0.5 rounded ${diff > 0 ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700"}`}>
                                                                {diff > 0 ? "+" : ""}{diff}
                                                            </span>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {selectedDate && !dayData && (
                        <p className="text-center text-gray-400 text-sm py-4">{language === "es" ? "Sin datos para este día" : "No data for this day"}</p>
                    )}
                </div>
            );
        }
