                    .limit(50)
                    .onSnapshot((snap) => {
                        const reqs = [];
                        snap.forEach(doc => {
                            const d = doc.data();
                            if (d.submittedBy === staffName) reqs.push({ id: doc.id, ...d });
                        });
                        setMyRequests(reqs.slice(0, 10));
                    }, (err) => { console.error("Error loading requests:", err); });
                return () => unsub();
            }, [staffName]);

            const handlePhotoSelect = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                setPhotoFile(file);
                const reader = new FileReader();
                reader.onload = (ev) => setPhotoPreview(ev.target.result);
                reader.readAsDataURL(file);
            };

            const handleSubmit = async () => {
                if (!description.trim() || !location) return;
                setSubmitting(true);
                try {
                    let photoUrl = null;
                    if (photoFile) {
                        const ref = storage.ref().child("maintenance-photos/" + Date.now() + "_" + photoFile.name);
                        await ref.put(photoFile);
                        photoUrl = await ref.getDownloadURL();
                    }
                    const now = new Date();
                    await db.collection("maintenanceRequests").add({
                        description: description.trim(),
                        location,
                        urgency,
                        reason: reason.trim(),
                        photoUrl,
                        submittedBy: staffName,
                        createdAt: now.toISOString(),
                        date: now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + "-" + String(now.getDate()).padStart(2, "0"),
                        status: "open"
                    });
                    setDescription("");
                    setLocation("");
                    setUrgency("normal");
                    setReason("");
                    setPhotoFile(null);
                    setPhotoPreview(null);
                    setSubmitted(true);
                    setTimeout(() => setSubmitted(false), 3000);
                } catch (err) {
                    console.error("Error submitting request:", err);
                    alert(language === "es" ? "Error al enviar solicitud" : "Error submitting request");
                }
                setSubmitting(false);
            };

            const statusColors = { open: "bg-yellow-100 text-yellow-700", "in-progress": "bg-blue-100 text-blue-700", completed: "bg-green-100 text-green-700", declined: "bg-red-100 text-red-700" };
            const statusLabels = { open: language === "es" ? "Abierto" : "Open", "in-progress": language === "es" ? "En Progreso" : "In Progress", completed: language === "es" ? "Completado" : "Completed", declined: language === "es" ? "Rechazado" : "Declined" };

            return (
                <div className="p-4 pb-24">
                    <h2 className="text-2xl font-bold text-poke-700 mb-2">🔧 {language === "es" ? "Solicitud de Mantenimiento" : "Maintenance Request"}</h2>
                    <p className="text-xs text-gray-500 mb-4">{language === "es" ? "Reporta cualquier problema o reparación necesaria" : "Report any issue or repair needed"}</p>

                    {submitted && (
                        <div className="mb-4 p-3 bg-green-100 border border-green-300 rounded-lg text-center text-green-700 font-bold text-sm">
                            ✅ {language === "es" ? "¡Solicitud enviada!" : "Request submitted!"}
                        </div>
                    )}

                    <div className="bg-white rounded-xl border-2 border-gray-200 p-4 space-y-4 mb-6">
                        {/* What — description */}
                        <div>
                            <label className="text-xs font-bold text-gray-600 uppercase tracking-wide block mb-1">
                                {language === "es" ? "¿Qué necesita arreglo?" : "What needs fixing?"} *
                            </label>
                            <textarea value={description} onChange={e => setDescription(e.target.value)}
                                rows={3} placeholder={language === "es" ? "Describe el problema..." : "Describe the issue..."}
                                className="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-poke-500 focus:outline-none" />
                        </div>

                        {/* Where — location */}
                        <div>
                            <label className="text-xs font-bold text-gray-600 uppercase tracking-wide block mb-1">
                                {language === "es" ? "¿Dónde?" : "Where?"} *
                            </label>
                            <select value={location} onChange={e => setLocation(e.target.value)}
                                className="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-poke-500 focus:outline-none">
                                <option value="">{language === "es" ? "Selecciona ubicación..." : "Select location..."}</option>
                                {locationOptions.map(loc => (
                                    <option key={loc.en} value={loc.en}>{language === "es" ? loc.es : loc.en}</option>
                                ))}
                            </select>
                        </div>

                        {/* Urgency */}
                        <div>
                            <label className="text-xs font-bold text-gray-600 uppercase tracking-wide block mb-1">
                                {language === "es" ? "Urgencia" : "Urgency"}
                            </label>
                            <div className="flex gap-2">
                                {[
                                    { val: "low", en: "Low", es: "Baja", color: "bg-gray-100 text-gray-700 border-gray-300", active: "bg-gray-700 text-white border-gray-700" },
                                    { val: "normal", en: "Normal", es: "Normal", color: "bg-yellow-50 text-yellow-700 border-yellow-300", active: "bg-yellow-600 text-white border-yellow-600" },
                                    { val: "high", en: "High", es: "Alta", color: "bg-orange-50 text-orange-700 border-orange-300", active: "bg-orange-600 text-white border-orange-600" },
                                    { val: "urgent", en: "Urgent", es: "Urgente", color: "bg-red-50 text-red-700 border-red-300", active: "bg-red-600 text-white border-red-600" }
                                ].map(u => (
                                    <button key={u.val} onClick={() => setUrgency(u.val)}
                                        className={`flex-1 py-2 rounded-lg text-xs font-bold border-2 transition ${urgency === u.val ? u.active : u.color}`}>
                                        {language === "es" ? u.es : u.en}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Why */}
                        <div>
                            <label className="text-xs font-bold text-gray-600 uppercase tracking-wide block mb-1">
                                {language === "es" ? "¿Por qué es importante? (opcional)" : "Why is this important? (optional)"}
                            </label>
                            <input type="text" value={reason} onChange={e => setReason(e.target.value)}
                                placeholder={language === "es" ? "Riesgo de seguridad, afecta servicio, etc." : "Safety risk, affects service, etc."}
                                className="w-full border-2 border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-poke-500 focus:outline-none" />
                        </div>

                        {/* Photo */}
                        <div>
                            <label className="text-xs font-bold text-gray-600 uppercase tracking-wide block mb-1">
                                {language === "es" ? "📷 Foto (opcional)" : "📷 Photo (optional)"}
                            </label>
                            {photoPreview ? (
                                <div className="relative">
                                    <img src={photoPreview} alt="Preview" className="rounded-lg border border-gray-200 max-w-full" style={{maxHeight: "200px"}} />
                                    <button onClick={() => { setPhotoFile(null); setPhotoPreview(null); }}
                                        className="absolute top-1 right-1 bg-red-500 text-white rounded-full w-6 h-6 text-xs font-bold">✕</button>
                                </div>
                            ) : (
                                <label className="block w-full py-3 border-2 border-dashed border-gray-300 rounded-lg text-center text-sm text-gray-500 cursor-pointer hover:border-poke-400 hover:text-poke-600 transition">
                                    📷 {language === "es" ? "Toca para tomar foto" : "Tap to take photo"}
                                    <input type="file" accept="image/*" capture="environment" onChange={handlePhotoSelect} className="hidden" />
                                </label>
                            )}
                        </div>

                        {/* Submit */}
                        <button onClick={handleSubmit}
                            disabled={submitting || !description.trim() || !location}
                            className={`w-full py-3 rounded-lg font-bold text-white text-lg transition ${
                                submitting || !description.trim() || !location ? "bg-gray-300 cursor-not-allowed" : "bg-poke-700 hover:bg-poke-800"}`}>
                            {submitting ? (language === "es" ? "Enviando..." : "Submitting...") : (language === "es" ? "📩 Enviar Solicitud" : "📩 Submit Request")}
                        </button>
                    </div>

                    {/* My recent requests */}
                    {myRequests.length > 0 && (
                        <div>
                            <h3 className="text-lg font-bold text-gray-700 mb-2">{language === "es" ? "Mis Solicitudes Recientes" : "My Recent Requests"}</h3>
                            <div className="space-y-2">
                                {myRequests.map(req => (
                                    <div key={req.id} className="bg-white rounded-lg border border-gray-200 p-3">
                                        <div className="flex items-start justify-between mb-1">
                                            <p className="text-sm font-bold text-gray-800 flex-1">{req.description}</p>
                                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full ml-2 whitespace-nowrap ${statusColors[req.status] || "bg-gray-100 text-gray-600"}`}>
                                                {statusLabels[req.status] || req.status}
                                            </span>
                                        </div>
                                        <p className="text-xs text-gray-500">📍 {req.location} • {new Date(req.createdAt).toLocaleDateString()}</p>
                                        {req.adminNote && <p className="text-xs text-blue-600 mt-1">💬 {req.adminNote}</p>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Admin Panel Component
        function AdminPanel({ language, staffList, setStaffList }) {
            const [editingId, setEditingId] = useState(null);
            const [editPin, setEditPin] = useState("");
            const [editRole, setEditRole] = useState("");
            const [showAdd, setShowAdd] = useState(false);
            const [newName, setNewName] = useState("");
            const [newRole, setNewRole] = useState("FOH");
            const [newPin, setNewPin] = useState("");
            const [savedMsg, setSavedMsg] = useState(null);
            const [confirmRemoveId, setConfirmRemoveId] = useState(null);
            const [staffExpanded, setStaffExpanded] = useState(false);
            const [maintenanceRequests, setMaintenanceRequests] = useState([]);
            const [maintenanceExpanded, setMaintenanceExpanded] = useState(true);
            const [selectedRequest, setSelectedRequest] = useState(null);
            const [adminNote, setAdminNote] = useState("");

            const showSaved = () => { setSavedMsg(true); setTimeout(() => setSavedMsg(null), 1500); };

            // Load maintenance requests
            useEffect(() => {
                const unsub = db.collection("maintenanceRequests")
                    .orderBy("createdAt", "desc")
                    .limit(50)
                    .onSnapshot((snap) => {
                        const reqs = [];
                        snap.forEach(doc => reqs.push({ id: doc.id, ...doc.data() }));
                        setMaintenanceRequests(reqs);
                    }, (err) => { console.error("Error loading maintenance requests:", err); });
                return () => unsub();
            }, []);

            const updateRequestStatus = async (reqId, newStatus) => {
                try {
                    const updates = { status: newStatus, updatedAt: new Date().toISOString() };
                    if (adminNote.trim()) updates.adminNote = adminNote.trim();
                    await db.collection("maintenanceRequests").doc(reqId).update(updates);
                    setAdminNote("");
                    showSaved();
                } catch (err) { console.error("Error updating request:", err); }
            };

            const addAdminNoteToRequest = async (reqId) => {
                if (!adminNote.trim()) return;
                try {
                    await db.collection("maintenanceRequests").doc(reqId).update({
                        adminNote: adminNote.trim(), updatedAt: new Date().toISOString()
                    });
                    setAdminNote("");
                    showSaved();
                } catch (err) { console.error("Error adding note:", err); }
            };

            const saveStaffToFirestore = async (updatedList) => {
                try {
                    await db.collection("config").doc("staff").set({ list: updatedList });
                } catch (err) { console.error("Error saving staff:", err); }
            };

            const handleSavePin = async (id) => {
                if (editPin.length !== 4 || !/^\d{4}$/.test(editPin)) return;
                const updated = staffList.map(s => s.id === id ? { ...s, pin: editPin, role: editRole } : s);
                setStaffList(updated);
                await saveStaffToFirestore(updated);
                setEditingId(null);
                setEditPin("");
                setEditRole("");
                showSaved();
            };

            const handleAddStaff = async () => {
                if (!newName.trim() || newPin.length !== 4 || !/^\d{4}$/.test(newPin)) return;
                const maxId = Math.max(...staffList.map(s => s.id), 0);
                const newStaff = { id: maxId + 1, name: newName.trim(), role: newRole, pin: newPin };
                const updated = [...staffList, newStaff];
                setStaffList(updated);
                await saveStaffToFirestore(updated);
                setShowAdd(false);
                setNewName("");
                setNewRole("FOH");
                setNewPin("");
                showSaved();
            };

            const handleRemoveStaff = async (id) => {
                const person = staffList.find(s => s.id === id);
                if (isAdmin(person?.name)) return; // can't remove admins
                const updated = staffList.filter(s => s.id !== id);
                setStaffList(updated);
                await saveStaffToFirestore(updated);
                setConfirmRemoveId(null);
                showSaved();
            };

            const roleOptions = ["FOH", "BOH", "Shift Lead", "Kitchen Manager", "Asst Kitchen Manager", "Manager", "Owner", "Prep", "Grill", "Fryer", "Bowl Line", "Push Pops", "Proteins", "Rice", "Toppings", "Boba/Drinks", "Dish"];

            return (
                <div className="p-4 pb-24">
                    <h2 className="text-2xl font-bold text-poke-700 mb-2">⚙️ {t("adminPanel", language)}</h2>
                    <p className="text-xs text-gray-500 mb-4 bg-poke-50 border border-poke-200 rounded-lg p-2">
                        🔐 {language === "es"
                            ? "Solo Owner Name y Manager Name pueden acceder a este panel."
                            : "Only Owner Name and Manager Name can access this panel."}
                    </p>

                    {savedMsg && (
                        <div className="mb-3 p-2 bg-green-100 border border-green-300 rounded-lg text-center text-green-700 font-bold text-sm">
                            ✅ {t("saved", language)}
                        </div>
                    )}

                    {/* ── MAINTENANCE REQUESTS ── */}
                    <div className="mb-6">
                        <button onClick={() => setMaintenanceExpanded(!maintenanceExpanded)}
                            className="w-full flex items-center justify-between bg-red-50 border-2 border-red-200 rounded-xl p-4 hover:bg-red-100 transition">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">🔧</span>
                                <div className="text-left">
                                    <h3 className="font-bold text-red-700">{language === "es" ? "Solicitudes de Mantenimiento" : "Maintenance Requests"}</h3>
                                    <p className="text-xs text-red-500">
                                        {maintenanceRequests.filter(r => r.status === "open").length} {language === "es" ? "abiertos" : "open"}
                                        {maintenanceRequests.filter(r => r.status === "in-progress").length > 0 && (
                                            ` • ${maintenanceRequests.filter(r => r.status === "in-progress").length} ${language === "es" ? "en progreso" : "in progress"}`
                                        )}
                                    </p>
                                </div>
                            </div>
                            <span className="text-gray-400 text-xl">{maintenanceExpanded ? "▼" : "▶"}</span>
                        </button>

                        {maintenanceExpanded && (
                            <div className="mt-2 space-y-2">
                                {maintenanceRequests.length === 0 ? (
                                    <p className="text-center text-gray-400 text-sm py-4">{language === "es" ? "No hay solicitudes" : "No requests yet"}</p>
                                ) : maintenanceRequests.map(req => {
                                    const isExpanded = selectedRequest === req.id;
                                    const statusColors = { open: "bg-yellow-100 text-yellow-700 border-yellow-300", "in-progress": "bg-blue-100 text-blue-700 border-blue-300", completed: "bg-green-100 text-green-700 border-green-300", declined: "bg-red-100 text-red-700 border-red-300" };
                                    const urgencyDot = { low: "🟢", normal: "🟡", high: "🟠", urgent: "🔴" };
                                    return (
                                        <div key={req.id} className={`bg-white rounded-lg border-2 overflow-hidden ${req.status === "open" ? "border-yellow-200" : "border-gray-200"}`}>
                                            <button onClick={() => setSelectedRequest(isExpanded ? null : req.id)}
                                                className="w-full p-3 text-left">
                                                <div className="flex items-start justify-between">
                                                    <div className="flex-1">
                                                        <div className="flex items-center gap-1.5 mb-0.5">
                                                            <span className="text-sm">{urgencyDot[req.urgency] || "🟡"}</span>
                                                            <p className="text-sm font-bold text-gray-800">{req.description}</p>
                                                        </div>
                                                        <p className="text-xs text-gray-500">📍 {req.location} • 👤 {req.submittedBy} • {new Date(req.createdAt).toLocaleDateString()}</p>
                                                    </div>
                                                    <span className={`text-xs font-bold px-2 py-0.5 rounded-full border ml-2 whitespace-nowrap ${statusColors[req.status] || "bg-gray-100 text-gray-600 border-gray-300"}`}>
                                                        {req.status === "in-progress" ? (language === "es" ? "En Progreso" : "In Progress") : req.status === "open" ? (language === "es" ? "Abierto" : "Open") : req.status === "completed" ? (language === "es" ? "Completado" : "Done") : (language === "es" ? "Rechazado" : "Declined")}
                                                    </span>
                                                </div>
                                            </button>

                                            {isExpanded && (
                                                <div className="px-3 pb-3 border-t border-gray-100 pt-2 space-y-2">
                                                    {req.reason && <p className="text-xs text-gray-600"><span className="font-bold">{language === "es" ? "Razón:" : "Why:"}</span> {req.reason}</p>}
                                                    <p className="text-xs text-gray-500">{language === "es" ? "Enviado:" : "Submitted:"} {new Date(req.createdAt).toLocaleString()}</p>
                                                    {req.photoUrl && (
                                                        <img src={req.photoUrl} alt="Maintenance" className="rounded-lg border border-gray-200 max-w-full cursor-pointer" style={{maxHeight: "200px"}}
                                                            onClick={() => window.open(req.photoUrl, "_blank")} />
                                                    )}
                                                    {req.adminNote && <p className="text-xs bg-blue-50 border border-blue-200 rounded p-2 text-blue-700">💬 {req.adminNote}</p>}

                                                    {/* Admin note input */}
                                                    <div className="flex gap-1">
                                                        <input type="text" value={adminNote} onChange={e => setAdminNote(e.target.value)}
                                                            placeholder={language === "es" ? "Agregar nota..." : "Add note..."}
                                                            className="flex-1 border border-gray-200 rounded px-2 py-1.5 text-xs" />
                                                        <button onClick={() => addAdminNoteToRequest(req.id)}
                                                            className="bg-blue-500 text-white text-xs font-bold px-2 py-1.5 rounded">💬</button>
                                                    </div>

                                                    {/* Status buttons */}
                                                    <div className="flex gap-1.5">
                                                        {req.status !== "in-progress" && (
                                                            <button onClick={() => updateRequestStatus(req.id, "in-progress")}
                                                                className="flex-1 py-1.5 bg-blue-500 text-white rounded text-xs font-bold">
                                                                {language === "es" ? "En Progreso" : "In Progress"}
                                                            </button>
                                                        )}
                                                        {req.status !== "completed" && (
                                                            <button onClick={() => updateRequestStatus(req.id, "completed")}
                                                                className="flex-1 py-1.5 bg-green-600 text-white rounded text-xs font-bold">
                                                                {language === "es" ? "Completado" : "Done"}
                                                            </button>
                                                        )}
                                                        {req.status !== "declined" && req.status !== "completed" && (
                                                            <button onClick={() => updateRequestStatus(req.id, "declined")}
                                                                className="flex-1 py-1.5 bg-red-500 text-white rounded text-xs font-bold">
                                                                {language === "es" ? "Rechazar" : "Decline"}
                                                            </button>
                                                        )}
                                                        {(req.status === "completed" || req.status === "declined") && (
                                                            <button onClick={() => updateRequestStatus(req.id, "open")}
                                                                className="flex-1 py-1.5 bg-yellow-500 text-white rounded text-xs font-bold">
                                                                {language === "es" ? "Reabrir" : "Reopen"}
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>

                    {/* ── STAFF LIST (collapsible) ── */}
                    <div className="mb-6">
                        <button onClick={() => setStaffExpanded(!staffExpanded)}
                            className="w-full flex items-center justify-between bg-blue-50 border-2 border-blue-200 rounded-xl p-4 hover:bg-blue-100 transition">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">👥</span>
                                <div className="text-left">
                                    <h3 className="font-bold text-blue-700">{language === "es" ? "Personal" : "Staff"}</h3>
                                    <p className="text-xs text-blue-500">{staffList.length} {language === "es" ? "empleados" : "members"}</p>
                                </div>
                            </div>
                            <span className="text-gray-400 text-xl">{staffExpanded ? "▼" : "▶"}</span>
                        </button>

                        {staffExpanded && (
                            <div className="mt-2">
                                <div className="space-y-2 mb-4">
                                    {staffList.map(person => (
                                        <div key={person.id} className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                                            {editingId === person.id ? (
                                                <div className="p-3 bg-blue-50 space-y-2">
                                                    <p className="font-bold text-gray-800">{person.name}</p>
                                                    <div>
                                                        <label className="text-xs text-gray-600 font-semibold">{t("staffRole", language)}</label>
                                                        <select value={editRole} onChange={(e) => setEditRole(e.target.value)}
                                                            className="w-full px-2 py-2 border-2 border-gray-300 rounded-lg focus:border-poke-700 focus:outline-none text-sm">
                                                            {roleOptions.map(r => <option key={r} value={r}>{r}</option>)}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="text-xs text-gray-600 font-semibold">{t("newPIN", language)}</label>
                                                        <input type="text" inputMode="numeric" maxLength={4} value={editPin}
                                                            onChange={(e) => setEditPin(e.target.value.replace(/\D/g, "").slice(0, 4))}
                                                            placeholder="0000"
                                                            className="w-full px-3 py-2 border-2 border-gray-300 rounded-lg text-center text-2xl tracking-widest font-mono focus:border-poke-700 focus:outline-none" />
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => handleSavePin(person.id)}
                                                            disabled={editPin.length !== 4}
                                                            className={`flex-1 py-2 rounded-lg font-bold text-white transition ${editPin.length === 4 ? "bg-green-700 hover:bg-green-800" : "bg-gray-300 cursor-not-allowed"}`}>
                                                            {t("save", language)}
                                                        </button>
                                                        <button onClick={() => { setEditingId(null); setEditPin(""); setEditRole(""); }}
                                                            className="flex-1 py-2 rounded-lg font-bold bg-gray-500 text-white hover:bg-gray-600 transition">
                                                            {t("cancel", language)}
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="p-3 flex items-center justify-between">
                                                    <div>
                                                        <p className="font-bold text-gray-800">{person.name}</p>
                                                        <p className="text-xs text-gray-500">{person.role} • PIN: {person.pin}</p>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <button onClick={() => { setEditingId(person.id); setEditPin(person.pin); setEditRole(person.role); }}
                                                            className="px-3 py-1.5 bg-blue-100 text-blue-700 rounded-lg text-xs font-bold hover:bg-blue-200 transition">
                                                            ✏️ {t("changePIN", language)}
                                                        </button>
                                                        {!isAdmin(person.name) && (
                                                            confirmRemoveId === person.id ? (
                                                                <div className="flex gap-1">
                                                                    <button onClick={() => handleRemoveStaff(person.id)}
                                                                        className="px-2 py-1.5 bg-red-600 text-white rounded-lg text-xs font-bold hover:bg-red-700">✓</button>
                                                                    <button onClick={() => setConfirmRemoveId(null)}
                                                                        className="px-2 py-1.5 bg-gray-400 text-white rounded-lg text-xs font-bold hover:bg-gray-500">✕</button>
                                                                </div>
                                                            ) : (
                                                                <button onClick={() => setConfirmRemoveId(person.id)}
                                                                    className="px-2 py-1.5 bg-poke-100 text-poke-700 rounded-lg text-xs font-bold hover:bg-poke-200 transition">
                                                                    🗑️
                                                                </button>
                                                            )
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                {showAdd ? (
                                    <div className="bg-green-50 border-2 border-green-300 rounded-lg p-4 space-y-3">
                                        <h3 className="font-bold text-green-800">{t("addStaff", language)}</h3>
                                        <div>
                                            <label className="text-xs text-gray-600 font-semibold">{t("staffName", language)}</label>
                                            <input type="text" value={newName} onChange={(e) => setNewName(e.target.value)}
                                                placeholder={language === "es" ? "Nombre completo" : "Full name"}
                                                className="w-full px-3 py-2 border-2 border-gray-300 rounded-lg focus:border-green-700 focus:outline-none" />
                                        </div>
                                        <div>
                                            <label className="text-xs text-gray-600 font-semibold">{t("staffRole", language)}</label>
                                            <select value={newRole} onChange={(e) => setNewRole(e.target.value)}
                                                className="w-full px-2 py-2 border-2 border-gray-300 rounded-lg focus:border-green-700 focus:outline-none text-sm">
                                                {roleOptions.map(r => <option key={r} value={r}>{r}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs text-gray-600 font-semibold">{t("staffPIN", language)} (4 {language === "es" ? "dígitos" : "digits"})</label>
                                            <input type="text" inputMode="numeric" maxLength={4} value={newPin}
                                                onChange={(e) => setNewPin(e.target.value.replace(/\D/g, "").slice(0, 4))}
                                                placeholder="0000"
                                                className="w-full px-3 py-2 border-2 border-gray-300 rounded-lg text-center text-2xl tracking-widest font-mono focus:border-green-700 focus:outline-none" />
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={handleAddStaff}
                                                disabled={!newName.trim() || newPin.length !== 4}
                                                className={`flex-1 py-2 rounded-lg font-bold text-white transition ${newName.trim() && newPin.length === 4 ? "bg-green-700 hover:bg-green-800" : "bg-gray-300 cursor-not-allowed"}`}>
                                                {t("addStaff", language)}
                                            </button>
                                            <button onClick={() => { setShowAdd(false); setNewName(""); setNewRole("FOH"); setNewPin(""); }}
                                                className="flex-1 py-2 rounded-lg font-bold bg-gray-500 text-white hover:bg-gray-600 transition">
                                                {t("cancel", language)}
                                            </button>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={() => setShowAdd(true)}
                                        className="w-full py-3 bg-green-700 text-white font-bold rounded-lg hover:bg-green-800 transition text-lg">
                                        + {t("addStaff", language)}
                                    </button>
                                )}
                            </div>
                        )}
                    </div>

                    {/* Checklist History Section */}
                    <div className="mt-8 pt-6 border-t-2 border-gray-200">
                        <h3 className="text-xl font-bold text-poke-700 mb-1">📋 {language === "es" ? "Historial de Listas" : "Checklist History"}</h3>
                        <p className="text-xs text-gray-500 mb-4">{language === "es"
                            ? "Revisa las listas de apertura y cierre de días anteriores"
                            : "Review opening and closing checklists from previous days"}</p>
                        <ChecklistHistory language={language} />
                    </div>

                    {/* Inventory History Section */}
                    <div className="mt-8 pt-6 border-t-2 border-gray-200">
                        <h3 className="text-xl font-bold text-poke-700 mb-1">📦 {language === "es" ? "Historial de Inventario" : "Inventory History"}</h3>
                        <p className="text-xs text-gray-500 mb-4">{language === "es"
                            ? "Revisa los conteos de inventario de días anteriores. Los cambios vs el día anterior se muestran en verde/rojo."
                            : "Review inventory counts from previous days. Changes vs the prior day are shown in green/red."}</p>
                        <InventoryHistory language={language} />
                    </div>
                </div>
            );
        }

        // Main App Component

        // ============ EMPLOYEE MANAGEMENT (Owner only) ============
        function Employees({ language, staffName, staffList }) {
            const [employees, setEmployees] = useState([]);
            const [selectedEmp, setSelectedEmp] = useState(null);
            const [editMode, setEditMode] = useState(false);
            const [editData, setEditData] = useState({});
            const [showAddNote, setShowAddNote] = useState(false);
            const [noteText, setNoteText] = useState("");
            const [searchQuery, setSearchQuery] = useState("");
            const [showInactive, setShowInactive] = useState(false);
            const [showAddEmployee, setShowAddEmployee] = useState(false);
            const [newEmp, setNewEmp] = useState({
                name: "", email: "", phone: "", birthday: "",
                role: "Line Server", location: "cwe", pin: "", hireDate: "",
                sendInvite: false
            });
            const [addEmpError, setAddEmpError] = useState("");

            useEffect(() => {
                const unsub = db.collection("employees").onSnapshot(snap => {
                    setEmployees(snap.docs.map(d=>({id:d.id,...d.data()})));
                });
                return () => unsub();
            }, []);

            // Sync staffList → employees collection (creates records for staff that don't have one)
            useEffect(() => {
                staffList.forEach(async s => {
                    const docId = s.name.replace(/\s/g,"_");
                    const existing = employees.find(e => e.id === docId);
                    if (!existing && isOwner(staffName)) {
                        await db.collection("employees").doc(docId).set({
                            name: s.name, role: s.role, location: s.location || "cwe",
                            pin: s.pin, status: "active", createdAt: new Date().toISOString()
                        }, { merge: true });
                    }
                });
            }, [staffList.length, employees.length]);

            // Add a new employee from the in-app form
            const addEmployee = async () => {
                setAddEmpError("");
                // Validation
                if (!newEmp.name.trim()) {
                    setAddEmpError(language==="es"?"El nombre es obligatorio":"Name is required");
                    return;
                }
                if (!/^\d{4}$/.test(newEmp.pin)) {
                    setAddEmpError(language==="es"?"El PIN debe ser de 4 dígitos":"PIN must be 4 digits");
                    return;
                }
                // Check for duplicate name
                if (staffList.some(s => s.name.toLowerCase() === newEmp.name.trim().toLowerCase())) {
                    setAddEmpError(language==="es"?"Ya existe un empleado con ese nombre":"An employee with that name already exists");
                    return;
                }
                // Check for duplicate PIN
                if (staffList.some(s => s.pin === newEmp.pin)) {
                    setAddEmpError(language==="es"?"Este PIN ya está en uso":"This PIN is already in use");
                    return;
                }

                const nameTrimmed = newEmp.name.trim();
                const docId = nameTrimmed.replace(/\s/g,"_");
                const newId = Math.max(0, ...staffList.map(s => s.id || 0)) + 1;

                try {
                    // Save to staffList document (matches existing AdminPanel path)
                    const newStaffEntry = {
                        id: newId,
                        name: nameTrimmed,
                        role: newEmp.role,
                        pin: newEmp.pin,
                        location: newEmp.location
                    };
                    const updatedStaff = [...staffList, newStaffEntry];
                    await db.collection("config").doc("staff").set({
                        list: updatedStaff
                    });

                    // Save full profile to employees collection
                    await db.collection("employees").doc(docId).set({
                        name: nameTrimmed,
                        role: newEmp.role,
                        location: newEmp.location,
                        pin: newEmp.pin,
                        email: newEmp.email.trim(),
                        phone: newEmp.phone.trim(),
                        birthday: newEmp.birthday,
                        hireDate: newEmp.hireDate || window.fmtLocalDate(),
                        status: "active",
                        createdAt: new Date().toISOString(),
                        createdBy: staffName
                    }, { merge: true });

                    // Send invite if requested
                    if (newEmp.sendInvite) {
                        await sendInvite(nameTrimmed, newEmp.email.trim(), newEmp.phone.trim(), newEmp.pin);
                    }

                    window.showToast(
                        (language==="es"?"✅ ":"✅ ") + nameTrimmed + (language==="es"?" agregado":" added"),
                        "success"
                    );

                    // Reset form
                    setNewEmp({
                        name: "", email: "", phone: "", birthday: "",
                        role: "Line Server", location: "cwe", pin: "", hireDate: "",
                        sendInvite: false
                    });
                    setShowAddEmployee(false);
                } catch(e) {
                    console.error(e);
                    setAddEmpError(language==="es"?"Error al guardar":"Error saving employee");
                }
            };

            // Send invitation (logs to inviteQueue; admin can also share manually)
            const sendInvite = async (empName, email, phone, pin) => {
                const inviteData = {
                    employee: empName,
                    email: email || "",
                    phone: phone || "",
                    pin: pin,
                    portalUrl: "https://staff.pokedoke.com",
                    sentBy: staffName,
                    sentAt: new Date().toISOString(),
                    status: "queued"
                };
                await db.collection("inviteQueue").add(inviteData);

                // Compose shareable message
                const msg = `Welcome to PokeDoke! 🐟\n\nYou're invited to the PokeDoke staff portal where you'll find your schedule, training, and team chat.\n\n1. On your phone, open: https://staff.pokedoke.com\n2. Log in with your name: ${empName}\n3. Enter your 4-digit PIN: ${pin}\n4. Tap "Add to Home Screen" so you can launch like an app and get notifications.\n\nWelcome to the team!`;

                // Try native share or clipboard fallback
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: "PokeDoke Staff Portal Invitation",
                            text: msg,
                        });
                    } catch(e) {
                        // User cancelled or share failed — fall back to clipboard
                        try {
                            await navigator.clipboard.writeText(msg);
                            window.showToast(language==="es"?"📋 Invitación copiada":"📋 Invite copied to clipboard", "info", 4000);
                        } catch(err) {}
                    }
                } else if (navigator.clipboard) {
                    try {
                        await navigator.clipboard.writeText(msg);
                        window.showToast(language==="es"?"📋 Invitación copiada — pégala en mensaje/email":"📋 Invite copied — paste into text/email", "info", 5000);
                    } catch(e) {}
                }
            };

            const saveEmployee = async () => {
                const docId = selectedEmp.name.replace(/\s/g,"_");
                await db.collection("employees").doc(docId).set({
                    ...editData, updatedAt: new Date().toISOString(), updatedBy: staffName
                }, { merge: true });
                setEditMode(false);
                setSelectedEmp({...selectedEmp,...editData});
            };

            const addNote = async () => {
                if(!noteText)return;
                const docId = selectedEmp.name.replace(/\s/g,"_");
                const newNotes = [...(selectedEmp.notes||[]),{id:Date.now().toString(),text:noteText,date:new Date().toISOString(),addedBy:staffName}];
                await db.collection("employees").doc(docId).update({notes:newNotes});
                setSelectedEmp({...selectedEmp,notes:newNotes});
                setNoteText(""); setShowAddNote(false);
            };

            const toggleStatus = async () => {
                if(!confirm(language==="es"?"¿Cambiar estado de "+selectedEmp.name+"?":"Change status for "+selectedEmp.name+"?"))return;
                const docId = selectedEmp.name.replace(/\s/g,"_");
                const newStatus = selectedEmp.status === "active" ? "inactive" : "active";
                const event = {
                    id: Date.now().toString(),
                    type: newStatus === "active" ? "reactivated" : "deactivated",
                    date: new Date().toISOString(),
                    by: staffName
                };
                const history = [...(selectedEmp.history||[]), event];
                await db.collection("employees").doc(docId).update({status:newStatus, history, updatedAt:new Date().toISOString()});
                setSelectedEmp({...selectedEmp,status:newStatus,history});
            };

            const visibleEmps = employees.filter(e=>{
                if(!showInactive && e.status==="inactive") return false;
                if(searchQuery && !e.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
                return true;
            }).sort((a,b)=>a.name.localeCompare(b.name));

            if (selectedEmp) {
                return (
                    <div className="pb-24 animate-in">
                        <div className="sticky top-0 z-20 px-4 py-3" style={{background: "var(--bg-primary)", borderBottom: "1px solid var(--border-subtle)"}}>
                            <button onClick={()=>{setSelectedEmp(null);setEditMode(false);}} className="text-sm font-bold flex items-center gap-1 active:opacity-70" style={{color: "#0891b2"}}>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M19 12H5"/>
                                    <path d="M12 19l-7-7 7-7"/>
                                </svg>
                                {language==="es"?"Volver":"Back"}
                            </button>
                        </div>
                        <div className="p-4">

                        <div className="bg-gradient-to-r from-poke-700 to-poke-600 rounded-2xl p-5 text-white mb-4">
                            <div className="flex justify-between items-start">
                                <div>
                                    <h2 className="text-2xl font-bold">{selectedEmp.name}</h2>
                                    <p className="text-poke-200 text-sm">{selectedEmp.role} · {selectedEmp.location==="all"?"All Locations":selectedEmp.location==="cwe"?"Central West End":"Kirkwood"}</p>
                                </div>
                                <span className={"text-xs font-bold px-2 py-1 rounded-full "+(selectedEmp.status==="active"?"bg-green-400 text-green-900":"bg-red-400 text-red-900")}>{selectedEmp.status==="active"?"✅ ACTIVE":"❌ INACTIVE"}</span>
                            </div>
                        </div>

                        {!editMode?(
                            <div className="space-y-3">
                                {/* Contact Info */}
                                <div className="bg-white rounded-2xl border border-gray-100 p-4">
                                    <p className="font-bold text-gray-800 text-sm mb-2">📞 {language==="es"?"Información de Contacto":"Contact Info"}</p>
                                    <div className="space-y-1 text-sm">
                                        <p><span className="text-gray-400">{language==="es"?"Teléfono":"Phone"}:</span> {selectedEmp.phone || "—"}</p>
                                        <p><span className="text-gray-400">Email:</span> {selectedEmp.email || "—"}</p>
                                        <p><span className="text-gray-400">{language==="es"?"Dirección":"Address"}:</span> {selectedEmp.address || "—"}</p>
                                        <p><span className="text-gray-400">{language==="es"?"Contacto de Emergencia":"Emergency Contact"}:</span> {selectedEmp.emergencyContact || "—"} {selectedEmp.emergencyPhone && "("+selectedEmp.emergencyPhone+")"}</p>
                                    </div>
                                </div>

                                {/* Employment Info */}
                                <div className="bg-white rounded-2xl border border-gray-100 p-4">
                                    <p className="font-bold text-gray-800 text-sm mb-2">💼 {language==="es"?"Empleo":"Employment"}</p>
                                    <div className="space-y-1 text-sm">
                                        <p><span className="text-gray-400">{language==="es"?"Fecha de Contratación":"Hire Date"}:</span> {selectedEmp.hireDate || "—"}</p>
                                        <p><span className="text-gray-400">{language==="es"?"Rol":"Role"}:</span> {selectedEmp.role}</p>
                                        <p><span className="text-gray-400">{language==="es"?"Ubicación":"Location"}:</span> {selectedEmp.location}</p>
                                        <p><span className="text-gray-400">{language==="es"?"Tarifa":"Wage"}:</span> ${selectedEmp.wage || "—"}/hr</p>
                                        <p><span className="text-gray-400">{language==="es"?"PIN":"PIN"}:</span> {selectedEmp.pin}</p>
                                    </div>
                                </div>

                                {/* Notes */}
                                <div className="bg-white rounded-2xl border border-gray-100 p-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <p className="font-bold text-gray-800 text-sm">📝 {language==="es"?"Notas":"Notes"}</p>
                                        <button onClick={()=>setShowAddNote(!showAddNote)} className="text-xs bg-poke-100 text-poke-700 px-2 py-1 rounded-lg font-bold">+ {language==="es"?"Nota":"Note"}</button>
                                    </div>
                                    {showAddNote && (
                                        <div className="mb-2">
                                            <textarea value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder={language==="es"?"Ej: Excelente atención al cliente":"e.g., Excellent customer service"} className="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm" rows="2"/>
                                            <button onClick={addNote} disabled={!noteText} className={"mt-2 w-full py-2 rounded-xl text-sm font-bold "+(noteText?"bg-poke-600 text-white":"bg-gray-200 text-gray-400")}>{language==="es"?"Agregar":"Add Note"}</button>
                                        </div>
                                    )}
                                    {(selectedEmp.notes||[]).slice().reverse().map(n=>(
                                        <div key={n.id} className="bg-gray-50 rounded-lg p-2 mb-1.5 text-sm">
                                            <p className="text-gray-800">{n.text}</p>
                                            <p className="text-xs text-gray-400 mt-1">{new Date(n.date).toLocaleDateString()} · {n.addedBy}</p>
                                        </div>
                                    ))}
                                    {!(selectedEmp.notes||[]).length&&<p className="text-xs text-gray-400 italic">{language==="es"?"Sin notas":"No notes yet"}</p>}
                                </div>

                                {/* History */}
                                <div className="bg-white rounded-2xl border border-gray-100 p-4">
                                    <p className="font-bold text-gray-800 text-sm mb-2">📜 {language==="es"?"Historial":"History"}</p>
                                    {(selectedEmp.history||[]).slice().reverse().map(h=>(
                                        <div key={h.id} className="text-sm py-1 border-b border-gray-50 last:border-0">
                                            <span className="font-semibold">{h.type==="reactivated"?"✅ Reactivated":h.type==="deactivated"?"❌ Deactivated":h.type}</span>
                                            <span className="text-gray-400 text-xs ml-2">{new Date(h.date).toLocaleDateString()} · {h.by}</span>
                                        </div>
                                    ))}
                                    {!(selectedEmp.history||[]).length&&<p className="text-xs text-gray-400 italic">{language==="es"?"Sin historial":"No history yet"}</p>}
                                </div>

                                {/* Actions */}
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={()=>{setEditMode(true);setEditData({...selectedEmp});}} className="py-3 bg-poke-600 text-white rounded-xl font-bold text-sm">✏️ {language==="es"?"Editar":"Edit"}</button>
                                    <button onClick={toggleStatus} className={"py-3 rounded-xl font-bold text-sm "+(selectedEmp.status==="active"?"bg-red-500 text-white":"bg-green-600 text-white")}>{selectedEmp.status==="active"?"❌ "+(language==="es"?"Desactivar":"Deactivate"):"✅ "+(language==="es"?"Reactivar":"Reactivate")}</button>
                                </div>
                            </div>
                        ):(
                            <div className="bg-white rounded-2xl border border-gray-100 p-4 space-y-3">
                                <p className="font-bold text-gray-800 text-sm">✏️ {language==="es"?"Editar":"Edit"} {selectedEmp.name}</p>
                                <div><label className="text-xs text-gray-500">{language==="es"?"Teléfono":"Phone"}</label><input type="tel" value={editData.phone||""} onChange={e=>setEditData({...editData,phone:e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm"/></div>
                                <div><label className="text-xs text-gray-500">Email</label><input type="email" value={editData.email||""} onChange={e=>setEditData({...editData,email:e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm"/></div>
                                <div><label className="text-xs text-gray-500">{language==="es"?"Dirección":"Address"}</label><input type="text" value={editData.address||""} onChange={e=>setEditData({...editData,address:e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm"/></div>
                                <div><label className="text-xs text-gray-500">{language==="es"?"Contacto de Emergencia":"Emergency Contact"}</label><input type="text" value={editData.emergencyContact||""} onChange={e=>setEditData({...editData,emergencyContact:e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm"/></div>
                                <div><label className="text-xs text-gray-500">{language==="es"?"Tel. de Emergencia":"Emergency Phone"}</label><input type="tel" value={editData.emergencyPhone||""} onChange={e=>setEditData({...editData,emergencyPhone:e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm"/></div>
                                <div><label className="text-xs text-gray-500">{language==="es"?"Fecha de Contratación":"Hire Date"}</label><input type="date" value={editData.hireDate||""} onChange={e=>setEditData({...editData,hireDate:e.target.value})} className="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm"/></div>
                                <div><label className="text-xs text-gray-500">{language==="es"?"Tarifa por Hora":"Hourly Wage"} ($)</label><input type="number" step="0.25" value={editData.wage||""} onChange={e=>setEditData({...editData,wage:parseFloat(e.target.value)||0})} className="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm"/></div>
                                <div className="flex gap-2 mt-3">
                                    <button onClick={saveEmployee} className="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold text-sm">💾 {language==="es"?"Guardar":"Save"}</button>
                                    <button onClick={()=>setEditMode(false)} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold text-sm">{language==="es"?"Cancelar":"Cancel"}</button>
                                </div>
                            </div>
                        )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 pb-24 animate-in">
                    <h2 className="text-2xl font-bold text-gray-800 mb-1">👥 {language==="es"?"Empleados":"Employees"}</h2>
                    <p className="text-sm text-gray-400 mb-4">{language==="es"?"Información detallada de cada miembro del personal":"Detailed info on each staff member"}</p>

                    <button onClick={()=>setShowAddEmployee(true)} className="w-full mb-3 py-3 rounded-xl font-bold text-sm bg-gradient-to-r from-green-500 to-emerald-600 text-white shadow-md active:scale-95 transition flex items-center justify-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                        {language==="es"?"Agregar Empleado":"Add New Employee"}
                    </button>

                    <input type="search" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder={language==="es"?"Buscar...":"Search..."} className="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm mb-3"/>

                    <div className="flex items-center justify-between mb-3">
                        <p className="text-xs text-gray-500">{visibleEmps.length} {language==="es"?"empleados":"employees"}</p>
                        <button onClick={()=>setShowInactive(!showInactive)} className="text-xs text-poke-600 font-bold">{showInactive?(language==="es"?"Ocultar inactivos":"Hide inactive"):(language==="es"?"Mostrar inactivos":"Show inactive")}</button>
                    </div>

                    <div className="space-y-2">
                        {visibleEmps.map(emp=>(
                            <button key={emp.id} onClick={()=>setSelectedEmp(emp)} className="w-full bg-white rounded-2xl border border-gray-100 shadow-sm p-3 text-left active:bg-gray-50">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <p className={"font-bold text-sm "+(emp.status==="inactive"?"text-gray-400 line-through":"text-gray-800")}>{emp.name}</p>
                                        <p className="text-xs text-gray-400">{emp.role} · {emp.location==="all"?"All":emp.location==="cwe"?"CWE":"Kirkwood"}{emp.hireDate&&" · Hired "+emp.hireDate}</p>
                                    </div>
                                    <span className={"text-xs font-bold "+(emp.status==="active"?"text-green-600":"text-red-500")}>{emp.status==="active"?"✅":"❌"}</span>
                                </div>
                            </button>
                        ))}
                    </div>

                    {/* ===== ADD EMPLOYEE MODAL ===== */}
                    {showAddEmployee && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center animate-in" style={{background: "rgba(0,0,0,0.5)"}} onClick={()=>{setShowAddEmployee(false);setAddEmpError("");}}>
                            <div className="card p-5 max-w-md w-full animate-scale" style={{maxHeight: "90vh", overflowY: "auto", borderTopLeftRadius: 24, borderTopRightRadius: 24}} onClick={e=>e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">

        // ============ TEAM MESSAGING ============
        function Messages({ language, staffName, staffList }) {
            const [channels, setChannels] = useState(["general"]);
            const [activeChannel, setActiveChannel] = useState("general");
            const [messages, setMessages] = useState([]);
            const [newMessage, setNewMessage] = useState("");
            const [showDM, setShowDM] = useState(null);
            const messagesEndRef = useRef(null);
            const mgrAccess = isAdmin(staffName);
            const myLoc = staffList.find(s=>s.name===staffName)?.location || "cwe";

            // Determine channel ID (location-based or direct message)
            const getChannelId = () => {
                if (showDM) {
                    const ids = [staffName, showDM].sort();
                    return "dm_" + ids.join("_").replace(/\s/g,"_");
                }
                if (activeChannel === "general") return "channel_general";
                if (activeChannel === "managers") return "channel_managers";
                return "channel_" + activeChannel;
            };

            const channelId = getChannelId();

            useEffect(() => {
                const unsub = db.collection("messages").doc(channelId).collection("msgs")
                    .orderBy("timestamp", "asc").limit(100).onSnapshot(snap => {
                        setMessages(snap.docs.map(d=>({id:d.id,...d.data()})));
                        setTimeout(()=>messagesEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
                    });
                return () => unsub();
            }, [channelId]);

            const sendMessage = async () => {
                if(!newMessage.trim())return;
                const msgText = newMessage;
                await db.collection("messages").doc(channelId).collection("msgs").add({
                    text: msgText, from: staffName, timestamp: new Date().toISOString()
                });
                setNewMessage("");

                // Notify recipients
                const preview = msgText.length > 120 ? msgText.slice(0,120) + "..." : msgText;
                if (showDM) {
                    // DM: notify just that person
                    sendNotification([showDM], staffName, preview, {type:"dm", sender:staffName});
                } else {
                    // Channel: notify everyone in that channel except sender
                    let recipients = [];
                    if (activeChannel === "general") {
                        recipients = staffList.filter(s => s.name !== staffName).map(s => s.name);
                    } else if (activeChannel === "managers") {
                        recipients = staffList.filter(s => s.name !== staffName && isAdmin(s.name)).map(s => s.name);
                    } else if (activeChannel === "cwe") {
                        recipients = staffList.filter(s => s.name !== staffName && (s.location === "cwe" || s.location === "all")).map(s => s.name);
                    } else if (activeChannel === "kirkwood") {
                        recipients = staffList.filter(s => s.name !== staffName && (s.location === "kirkwood" || s.location === "all")).map(s => s.name);
                    }
                    if (recipients.length > 0) {
                        const channelLabel = activeChannel === "general" ? "#general" : activeChannel === "managers" ? "#managers" : "#" + activeChannel;
                        sendNotification(recipients, staffName + " in " + channelLabel, preview, {type:"channel", channel:activeChannel, sender:staffName});
                    }
                }
            };

            const CHANNELS = [
                {id:"general", name:"💬 General", access:"all"},
                {id:"cwe", name:"📍 CWE", access:"cwe"},
                {id:"kirkwood", name:"📍 Kirkwood", access:"kirkwood"},
                {id:"managers", name:"👔 Managers", access:"managers"}
            ];

            const visibleChannels = CHANNELS.filter(c=>{
                if(c.access==="all") return true;
                if(c.access==="managers") return mgrAccess;
                return myLoc===c.access || myLoc==="all" || mgrAccess;
            });

            if (showDM) {
                return (
                    <div className="fixed inset-0 z-50 flex flex-col" style={{background: "var(--bg-primary)"}}>
                        <div className="p-4 bg-gradient-to-r from-poke-700 to-poke-600 text-white shadow-lg" style={{paddingTop: "max(16px, env(safe-area-inset-top))"}}>
                            <button onClick={()=>setShowDM(null)} className="text-sm font-bold mb-1 flex items-center gap-1 active:opacity-70">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M19 12H5"/>
                                    <path d="M12 19l-7-7 7-7"/>
                                </svg>
                                {language==="es"?"Volver":"Back"}
                            </button>
                            <div className="flex items-center gap-3 mt-1">
                                <Avatar name={showDM} prefs={{}} size={36} />
                                <div>
                                    <h2 className="text-lg font-bold leading-tight">{showDM}</h2>
                                    <p className="text-xs text-poke-200">{language==="es"?"Mensaje directo":"Direct message"}</p>
                                </div>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-2" style={{background:"var(--bg-subtle)"}}>
                            {messages.length===0&&<p className="text-center text-sm py-8" style={{color:"var(--text-muted)"}}>{language==="es"?"Empieza la conversación":"Start the conversation"}</p>}
                            {messages.map(m=>{
                                const isMe = m.from===staffName;
                                return (
                                    <div key={m.id} className={"flex "+(isMe?"justify-end":"justify-start")}>
                                        <div className="max-w-xs px-3 py-2 rounded-2xl" style={isMe?{background:"#0891b2",color:"white"}:{background:"var(--bg-card)",border:"1px solid var(--border-subtle)",color:"var(--text-primary)"}}>
                                            <p className="text-sm whitespace-pre-wrap">{m.text}</p>
                                            <p className="text-[10px] mt-1" style={isMe?{color:"#a5f3fc"}:{color:"var(--text-muted)"}}>{new Date(m.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</p>
                                        </div>
                                    </div>
                                );
                            })}
                            <div ref={messagesEndRef}/>
                        </div>
                        <div className="p-3 flex gap-2" style={{background:"var(--bg-card)",borderTop:"1px solid var(--border-subtle)", paddingBottom: "max(12px, env(safe-area-inset-bottom))"}}>
                            <input value={newMessage} onChange={e=>setNewMessage(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),sendMessage())} placeholder={language==="es"?"Mensaje...":"Message..."} className="flex-1 px-4 py-2 rounded-full text-sm" style={{background:"var(--bg-card)",border:"1px solid var(--border-subtle)",color:"var(--text-primary)"}}/>
                            <button onClick={sendMessage} disabled={!newMessage.trim()} className="px-4 py-2 rounded-full font-bold text-sm" style={newMessage.trim()?{background:"#0891b2",color:"white"}:{background:"var(--bg-subtle)",color:"var(--text-muted)"}}>↑</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 pb-24 animate-in">
                    <div className="sticky z-20 -mx-4 px-4 py-2 mb-4" style={{top: "0px", background: "var(--bg-primary)"}}>
                        <h2 className="text-2xl font-bold mb-1" style={{color:"var(--text-primary)"}}>💬 {language==="es"?"Mensajes":"Messages"}</h2>

                        {/* Channels */}
                        <div className="flex gap-2 overflow-x-auto pb-1" style={{scrollbarWidth: "none"}}>
                            {visibleChannels.map(c=>(
                                <button key={c.id} onClick={()=>setActiveChannel(c.id)} className={"px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition "+(activeChannel===c.id?"bg-poke-600 text-white":"")} style={activeChannel===c.id?{}:{background:"var(--bg-subtle)",color:"var(--text-secondary)"}}>{c.name}</button>
                            ))}
                        </div>
                    </div>

                    {/* Channel Messages */}
                    <div className="rounded-2xl shadow-sm mb-4 overflow-hidden" style={{background:"var(--bg-card)",border:"1px solid var(--border-subtle)"}}>
                        <div className="max-h-96 overflow-y-auto p-3 space-y-2" style={{background:"var(--bg-subtle)"}}>
                            {messages.length===0&&<p className="text-center text-sm py-8" style={{color:"var(--text-muted)"}}>{language==="es"?"Sin mensajes":"No messages yet"}</p>}
                            {messages.map(m=>{
                                const isMe = m.from===staffName;
                                return (
                                    <div key={m.id} className={"flex "+(isMe?"justify-end":"justify-start")}>
                                        <div className="max-w-xs px-3 py-2 rounded-2xl" style={isMe?{background:"#0891b2",color:"white"}:{background:"var(--bg-card)",border:"1px solid var(--border-subtle)",color:"var(--text-primary)"}}>
                                            {!isMe&&<p className="text-xs font-bold mb-0.5" style={{color:"#0891b2"}}>{m.from}</p>}
                                            <p className="text-sm whitespace-pre-wrap">{m.text}</p>
                                            <p className="text-[10px] mt-1" style={isMe?{color:"#a5f3fc"}:{color:"var(--text-muted)"}}>{new Date(m.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</p>
                                        </div>
                                    </div>
                                );
                            })}
                            <div ref={messagesEndRef}/>
                        </div>
                        <div className="p-2 flex gap-2" style={{background:"var(--bg-card)",borderTop:"1px solid var(--border-subtle)"}}>
                            <input value={newMessage} onChange={e=>setNewMessage(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),sendMessage())} placeholder={language==="es"?"Mensaje...":"Message..."} className="flex-1 px-3 py-2 rounded-full text-sm" style={{background:"var(--bg-card)",border:"1px solid var(--border-subtle)",color:"var(--text-primary)"}}/>
                            <button onClick={sendMessage} disabled={!newMessage.trim()} className="px-3 py-2 rounded-full font-bold text-sm" style={newMessage.trim()?{background:"#0891b2",color:"white"}:{background:"var(--bg-subtle)",color:"var(--text-muted)"}}>↑</button>
                        </div>
                    </div>

                    {/* Direct Message Staff */}
                    <p className="font-bold text-sm mb-2" style={{color:"var(--text-primary)"}}>📩 {language==="es"?"Mensajes Directos":"Direct Messages"}</p>
                    <div className="space-y-1">
                        {staffList.filter(s=>s.name!==staffName).map(s=>(
                            <button key={s.id} onClick={()=>setShowDM(s.name)} className="w-full flex items-center gap-3 p-3 rounded-xl active:opacity-70 transition" style={{background:"var(--bg-card)",border:"1px solid var(--border-subtle)"}}>
                                <div className="w-10 h-10 rounded-full font-bold flex items-center justify-center" style={{background:"#cffafe",color:"#155e75"}}>{s.name.split(" ").map(n=>n[0]).join("")}</div>
                                <div className="flex-1 text-left">
                                    <p className="font-semibold text-sm" style={{color:"var(--text-primary)"}}>{s.name}</p>
                                    <p className="text-xs" style={{color:"var(--text-muted)"}}>{s.role}</p>
                                </div>
                                <span className="text-gray-300">→</span>
                            </button>
                        ))}
                    </div>
                </div>
            );
        }
