        // Training Hub Component
        function TrainingHub({ staffName, language }) {
            const [progress, setProgress] = useState({});
            const [loading, setLoading] = useState(true);
            const [expandedModule, setExpandedModule] = useState(null);
            const [expandedLesson, setExpandedLesson] = useState(null);

            useEffect(() => {
                // Load training progress from Firestore
                const docRef = db.collection("training").doc(staffName);
                const unsubscribe = docRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        setProgress(doc.data().modules || {});
                    } else {
                        // Initialize empty progress
                        const newProgress = {};
                        TRAINING_MODULES.forEach(mod => {
                            newProgress[mod.id.toString()] = new Array(mod.lessons.length).fill(false);
                        });
                        setProgress(newProgress);
                    }
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [staffName]);

            const toggleLesson = async (moduleId, lessonIndex) => {
                const moduleIdStr = moduleId.toString();
                const newProgress = { ...progress };
                if (!newProgress[moduleIdStr]) {
                    newProgress[moduleIdStr] = new Array(TRAINING_MODULES.find(m => m.id === moduleId).lessons.length).fill(false);
                }
                newProgress[moduleIdStr][lessonIndex] = !newProgress[moduleIdStr][lessonIndex];
                setProgress(newProgress);

                // Write to Firestore
                try {
                    await db.collection("training").doc(staffName).set({ modules: newProgress }, { merge: true });
                } catch (err) {
                    console.error("Error updating training progress:", err);
                }
            };

            const toggleModule = (moduleId) => {
                setExpandedModule(expandedModule === moduleId ? null : moduleId);
                setExpandedLesson(null);
            };

            const toggleLessonExpand = (lessonKey) => {
                setExpandedLesson(expandedLesson === lessonKey ? null : lessonKey);
            };

            if (loading) {
                return <div className="p-4 text-center">{t("loading", language)}</div>;
            }

            // Calculate overall progress
            let totalLessons = 0;
            let totalCompleted = 0;
            TRAINING_MODULES.forEach(mod => {
                const modProgress = progress[mod.id.toString()] || [];
                totalLessons += mod.lessons.length;
                totalCompleted += modProgress.filter(Boolean).length;
            });

            return (
                <div className="p-4 pb-24">
                    <h2 className="text-2xl font-bold text-mint-700 mb-2">📚 {t("trainingHub", language)}</h2>
                    <div className="mb-4 p-3 bg-mint-50 rounded-lg border border-mint-200">
                        <div className="flex justify-between items-center mb-1">
                            <span className="text-sm font-semibold text-mint-800">
                                {language === "es" ? "Progreso Total" : "Overall Progress"}
                            </span>
                            <span className="text-sm font-bold text-mint-700">{totalCompleted}/{totalLessons}</span>
                        </div>
                        <div className="bg-gray-200 rounded-full h-3">
                            <div
                                className="bg-mint-700 h-3 rounded-full transition-all"
                                style={{ width: `${totalLessons > 0 ? (totalCompleted / totalLessons) * 100 : 0}%` }}
                            />
                        </div>
                    </div>

                    {TRAINING_MODULES.map(module => {
                        const moduleIdStr = module.id.toString();
                        const moduleProgress = progress[moduleIdStr] || new Array(module.lessons.length).fill(false);
                        const completed = moduleProgress.filter(Boolean).length;
                        const total = module.lessons.length;
                        const isExpanded = expandedModule === module.id;
                        const isComplete = completed === total;

                        return (
                            <div key={module.id} className={`mb-3 bg-white rounded-lg border-2 overflow-hidden ${isComplete ? "border-green-300" : "border-gray-200"}`}>
                                <div
                                    className={`p-4 cursor-pointer ${isComplete ? "bg-gradient-to-r from-green-50 to-white" : "bg-gradient-to-r from-mint-50 to-white"}`}
                                    onClick={() => toggleModule(module.id)}
                                >
                                    <div className="flex items-center justify-between">
                                        <div className="flex-1">
                                            <div className="flex items-center gap-2">
                                                {isComplete && <span>✅</span>}
                                                <h3 className={`font-bold text-base ${isComplete ? "text-green-700" : "text-mint-700"}`}>
                                                    {language === "es" ? module.titleEs : module.titleEn}
                                                </h3>
                                            </div>
                                            <p className="text-xs text-gray-600 mt-1">{module.duration} • {module.role} • {completed}/{total}</p>
                                        </div>
                                        <span className={`text-xl transition-transform ${isExpanded ? "rotate-180" : ""}`}>▼</span>
                                    </div>
                                    <div className="mt-2 bg-gray-200 rounded-full h-2">
                                        <div
                                            className={`h-2 rounded-full transition-all ${isComplete ? "bg-green-500" : "bg-mint-700"}`}
                                            style={{ width: `${(completed / total) * 100}%` }}
                                        />
                                    </div>
                                </div>

                                {isExpanded && (
                                    <div className="border-t border-gray-200">
                                        {module.lessons.map((lesson, idx) => {
                                            const lessonKey = `${module.id}-${idx}`;
                                            const isLessonExpanded = expandedLesson === lessonKey;
                                            const isChecked = moduleProgress[idx] || false;

                                            return (
                                                <div key={idx} className={`border-b border-gray-100 last:border-b-0 ${isChecked ? "bg-green-50" : ""}`}>
                                                    <div className="flex items-center p-3">
                                                        <input
                                                            type="checkbox"
                                                            checked={isChecked}
                                                            onChange={(e) => { e.stopPropagation(); toggleLesson(module.id, idx); }}
                                                            className="w-5 h-5 text-mint-700 rounded focus:ring-2 focus:ring-mint-700 flex-shrink-0"
                                                        />
                                                        <div
                                                            className="ml-3 flex-1 cursor-pointer"
                                                            onClick={() => toggleLessonExpand(lessonKey)}
                                                        >
                                                            <div className="flex items-center justify-between">
                                                                <span className={`text-sm font-medium ${isChecked ? "line-through text-gray-400" : "text-gray-800"}`}>
                                                                    {language === "es" ? lesson.titleEs : lesson.titleEn}
                                                                </span>
                                                                <span className={`text-xs ml-2 transition-transform ${isLessonExpanded ? "rotate-180" : ""}`}>▾</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    {isLessonExpanded && (
                                                        <div className="px-4 pb-3 ml-8">
                                                            <div className="bg-gray-50 rounded-lg p-3 text-sm text-gray-700 leading-relaxed border-l-4 border-mint-700">
                                                                {language === "es" ? lesson.contentEs : lesson.contentEn}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        }

            // Load break plan from Firestore — keyed by selected date

            const checkDeadlines = () => {
                const now = new Date();
                const currentMinutes = now.getHours() * 60 + now.getMinutes();
                const tasks = customTasksRef.current;
                const ch = checksRef.current;
                const todayKey = getTodayKey();
                const alerts = [];
                ["FOH", "BOH"].forEach(side => {
                    ["morning", "afternoon"].forEach(period => {
                        const periodTasks = (tasks[side] && tasks[side][period]) || [];
                        periodTasks.forEach(item => {
                            if (!item.completeBy || !item.assignTo) return;
                            if (item.assignTo !== staffName) return;
                            const done = item.subtasks && item.subtasks.length > 0
                                ? item.subtasks.every(s => ch[s.id])
                                : !!ch[item.id];
                            if (done) return;
                            const [h, m] = item.completeBy.split(":").map(Number);
                            const deadlineMinutes = h * 60 + m;
                            const taskName = item.task.includes("\n") ? item.task.split("\n")[0] : item.task;
                            const timeStr = item.completeBy.replace(/^0/, "");
                            // 30-minute warning
                            const warn30Key = item.id + "_30_" + todayKey;
                            if (currentMinutes >= deadlineMinutes - 30 && currentMinutes < deadlineMinutes && !dismissedAlertsRef.current.has(warn30Key)) {
                                const minsLeft = deadlineMinutes - currentMinutes;
                                alerts.push({ key: warn30Key, type: "warning", taskName, timeStr, message: `${minsLeft} min left` });
                            }
                            // At deadline or overdue
                            const dueKey = item.id + "_due_" + todayKey;
                            if (currentMinutes >= deadlineMinutes && !dismissedAlertsRef.current.has(dueKey)) {
                                const overBy = currentMinutes - deadlineMinutes;
                                alerts.push({ key: dueKey, type: "overdue", taskName, timeStr, message: overBy === 0 ? "Due NOW" : `${overBy} min overdue` });
                            }
                        });
                    });
                });
                setActiveAlerts(alerts);
                // Also try browser notification for new alerts
                if ("Notification" in window && Notification.permission === "granted") {
                    alerts.forEach(a => {
                        const nKey = "notif_" + a.key;
                        if (!dismissedAlertsRef.current.has(nKey)) {
                            dismissedAlertsRef.current.add(nKey);
                            new Notification(a.type === "overdue" ? "Pokedoke - Task Due!" : "Pokedoke - Reminder", {
                                body: `"${a.taskName}" — ${a.message}`,
                                tag: nKey
                            });
                        }
                    });
                }
            };

            useEffect(() => {
                if ("Notification" in window && Notification.permission === "default") {

                checkDeadlines(); // run immediately

                setCustomTasks(updated);

                const updated = JSON.parse(JSON.stringify(customTasksRef.current));
                updated[checklistSide][activePeriod].splice(idx, 1);
                setCustomTasks(updated);
                await saveChecklistState(checksRef.current, updated);
            };

            const resetAllChecklists = async () => {
                if (!confirm(language === "es" ? "¿Guardar y reiniciar todas las tareas?" : "Save & reset all checklists?")) return;
                const todayKey = getTodayKey();
                const now = new Date().toISOString();
                try {
                    await db.collection("checklistHistory").doc(todayKey + "_saved").set({
                        checks: cleanForFirestore(checksRef.current), customTasks: cleanForFirestore(customTasksRef.current), date: now, savedBy: staffName
                    });
                } catch (err) { console.error("Error saving history:", err); }
                setChecks({});
                await saveChecklistState({}, customTasksRef.current);
            };

            const saveInventorySnapshot = async (counts, items) => {
                const now = new Date();
                const key = now.toISOString().split("T")[0] + "_" + now.toTimeString().split(" ")[0].replace(/:/g, "");
                // Filter out any undefined values from counts
                const cleanCounts = {};
                Object.entries(counts).forEach(([k, v]) => { cleanCounts[k] = v ?? 0; });
                try {
                    await db.collection("inventoryHistory").doc(key).set({
                        counts: cleanCounts,
                        items: items.map(cat => ({
                            category: cat.category || "",
                            items: cat.items.map(i => ({ id: i.id, name: i.name, nameEs: i.nameEs || "", supplier: i.supplier || "", orderDay: i.orderDay || "" }))
                        })),
                        date: now.toISOString()
                    });
                } catch (err) { console.error("Error saving inventory snapshot:", err); }
            };

            const updateInventoryCount = async (itemId, newCount) => {
                const newInventory = { ...inventory, [itemId]: parseInt(newCount) || 0 };
                setInventory(newInventory);
                try {
                    await db.collection("ops").doc("inventory").set({ counts: newInventory, customInventory, date: new Date().toISOString() });
                } catch (err) { console.error("Error updating inventory:", err); }
            };

            const saveAndResetInventory = async () => {
                setInventorySaving(true);
                try {
                    // Save snapshot to history
                    await saveInventorySnapshot(inventory, customInventory);
                    // Reset all counts to 0
                    const resetCounts = {};
                    customInventory.forEach(cat => {
                        cat.items.forEach(item => { resetCounts[item.id] = 0; });
                    });
                    setInventory(resetCounts);
                    await db.collection("ops").doc("inventory").set({ counts: resetCounts, customInventory, date: new Date().toISOString() });
                } catch (err) { console.error("Error saving/resetting inventory:", err); }
                setInventorySaving(false);
                setShowSaveConfirm(false);
            };

            const saveInventory = async (counts, items) => {
                try {
                    await db.collection("ops").doc("inventory").set({
                        counts, customInventory: items, date: new Date().toISOString()
                    });
                    await saveInventorySnapshot(counts, items);
                } catch (err) { console.error("Error updating inventory:", err); }
            };

            const addInvItem = async (catIdx) => {
                if (!invNewName.trim()) return;
                const category = customInventory[catIdx];
                const maxId = Math.max(...category.items.map(item => parseInt(item.id.split('-')[1])), -1);
                const newItem = {
                    id: catIdx + "-" + (maxId + 1),
                    name: invNewName.trim(),
                    nameEs: invNewNameEs.trim(),
                    supplier: invNewSupplier.trim(),
                    orderDay: invNewOrderDay
                };
                const updated = customInventory.map((cat, idx) =>
                    idx === catIdx ? { ...cat, items: [...cat.items, newItem] } : cat
                );
                setCustomInventory(updated);
                await saveInventory(inventory, updated);
                setInvNewName(""); setInvNewNameEs(""); setInvNewSupplier(""); setInvNewOrderDay("Fri"); setInvShowAddForm(null);
            };

            const saveInvEdit = async (catIdx, itemIdx) => {
                if (!invEditName.trim()) return;
                const updated = customInventory.map((cat, cIdx) =>
                    cIdx === catIdx
                        ? { ...cat, items: cat.items.map((item, iIdx) =>
                            iIdx === itemIdx
                                ? { ...item, name: invEditName.trim(), nameEs: invEditNameEs.trim(), supplier: invEditSupplier.trim(), orderDay: invEditOrderDay }
                                : item
                            )}
                        : cat
                );
                setCustomInventory(updated);
                await saveInventory(inventory, updated);
                setInvEditingIdx(null); setInvEditName(""); setInvEditNameEs(""); setInvEditSupplier(""); setInvEditOrderDay("Fri");
            };

            const deleteInvItem = async (catIdx, itemIdx) => {
                const updated = customInventory.map((cat, cIdx) =>
                    cIdx === catIdx
                        ? { ...cat, items: cat.items.filter((_, iIdx) => iIdx !== itemIdx) }
                        : cat
                );
                setCustomInventory(updated);
                await saveInventory(inventory, updated);
            };

            // Get tasks for current side + period
            const getCurrentTasks = () => {
                return (customTasks[checklistSide] && customTasks[checklistSide][activePeriod]) || [];
            };

            // Count all checkable items (tasks + subtasks) for completion stats
            const countTaskItems = (task) => {
                let total = 0, done = 0;
                if (task.subtasks && task.subtasks.length > 0) {
                    total += task.subtasks.length;
                    done += task.subtasks.filter(s => checks[s.id]).length;
                } else {
                    total += 1;
                    done += checks[task.id] ? 1 : 0;
                }
                if (task.requirePhoto) {
                    total += 1;
                    done += checks[task.id + "_photo"] ? 1 : 0;
                }
                return { total, done };
            };

            const getCompletionStats = (side) => {
                let total = 0, done = 0;
                TIME_PERIODS.forEach(p => {
                    const tasks = (customTasks[side] && customTasks[side][p.id]) || [];
                    tasks.forEach(t => { const c = countTaskItems(t); total += c.total; done += c.done; });
                });
                return { total, done };
            };

            const getPeriodStats = (side, periodId) => {
                const tasks = (customTasks[side] && customTasks[side][periodId]) || [];
                let total = 0, done = 0;
                tasks.forEach(t => { const c = countTaskItems(t); total += c.total; done += c.done; });
                return { total, done };
            };

            // Check if a task is fully complete (all subtasks + photo if required)
            const isTaskComplete = (task) => {
                if (task.subtasks && task.subtasks.length > 0) {
                    if (!task.subtasks.every(s => checks[s.id])) return false;
                } else {
                    if (!checks[task.id]) return false;
                }
                if (task.requirePhoto && !checks[task.id + "_photo"]) return false;
                return true;
            };

            if (!passwordEntered) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-gradient-to-b from-mint-50 to-white p-4">
                        <div className="bg-white rounded-lg border-2 border-mint-700 p-8 w-full max-w-sm">
                            <h2 className="text-2xl font-bold text-mint-700 mb-2">🔐 {t("dailyOps", language)}</h2>
                            <p className="text-gray-600 mb-6">{t("passwordProtected", language)}</p>
                            <form onSubmit={handlePasswordSubmit}>
                                <input type="password" placeholder={t("enterPassword", language)} value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-mint-700 mb-4" />
                                <button type="submit" className="w-full bg-mint-700 text-white font-bold py-2 rounded-lg hover:bg-mint-800 transition">
                                    {t("unlock", language)}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            const renderChecklist = () => {
                const tasks = getCurrentTasks();
                const periodStats = getPeriodStats(checklistSide, activePeriod);
                const overallStats = getCompletionStats(checklistSide);

                return (
                    <div className="space-y-3">
                        {/* FOH / BOH toggle — admins can switch, staff sees their own */}
                        {currentIsAdmin && (
                            <div className="flex gap-2 mb-3">
                                <button onClick={() => { setChecklistSide("FOH"); setEditMode(false); setEditingIdx(null); setShowAddForm(false); }}
                                    className={`flex-1 py-2 rounded-lg font-bold text-sm transition ${checklistSide === "FOH" ? "bg-blue-600 text-white" : "bg-blue-50 text-blue-700 border border-blue-200"}`}>
                                    FOH
                                </button>
                                <button onClick={() => { setChecklistSide("BOH"); setEditMode(false); setEditingIdx(null); setShowAddForm(false); }}
                                    className={`flex-1 py-2 rounded-lg font-bold text-sm transition ${checklistSide === "BOH" ? "bg-amber-600 text-white" : "bg-amber-50 text-amber-700 border border-amber-200"}`}>
                                    BOH
                                </button>
                            </div>
                        )}

                        {/* Overall progress bar */}
                        <div className="bg-gray-100 rounded-lg p-3 mb-2">
                            <div className="flex justify-between text-xs font-bold text-gray-600 mb-1">
                                <span>{checklistSide} — {language === "es" ? "Progreso del día" : "Day progress"}</span>
                                <span>{overallStats.done}/{overallStats.total}</span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-2">
                                <div className={`h-2 rounded-full transition-all ${checklistSide === "FOH" ? "bg-blue-500" : "bg-amber-500"}`}
                                    style={{ width: overallStats.total > 0 ? (overallStats.done / overallStats.total * 100) + "%" : "0%" }} />
                            </div>
                        </div>

                        {/* Time period selector — horizontal scroll */}
                        <div className="overflow-x-auto -mx-4 px-4">
                            <div className="flex gap-2 pb-2" style={{ minWidth: "max-content" }}>
                                {TIME_PERIODS.map(p => {
                                    const ps = getPeriodStats(checklistSide, p.id);
                                    const allDone = ps.total > 0 && ps.done === ps.total;
                                    return (
                                        <button key={p.id}
                                            onClick={() => { setActivePeriod(p.id); setEditMode(false); setEditingIdx(null); setShowAddForm(false); }}
                                            className={`flex flex-col items-center px-3 py-2 rounded-lg text-xs font-bold transition whitespace-nowrap border-2 ${
                                                activePeriod === p.id
                                                    ? (checklistSide === "FOH" ? "bg-blue-600 text-white border-blue-600" : "bg-amber-600 text-white border-amber-600")
                                                    : allDone
                                                        ? "bg-green-50 text-green-700 border-green-300"
                                                        : "bg-white text-gray-600 border-gray-200"
                                            }`}>
                                            <span className="text-base">{p.emoji}</span>
                                            <span>{language === "es" ? p.nameEs : p.nameEn}</span>
                                            {ps.total > 0 && <span className="text-[10px] opacity-75">{ps.done}/{ps.total}</span>}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Period header */}
                        <div className="flex justify-between items-center mt-2">
                            <div>
                                <h3 className="font-bold text-gray-800">
                                    {TIME_PERIODS.find(p => p.id === activePeriod)?.[language === "es" ? "nameEs" : "nameEn"]}
                                </h3>
                                <p className="text-sm text-gray-500">{periodStats.done}/{periodStats.total} {language === "es" ? "completado" : "completed"}</p>
                            </div>
                            {currentIsAdmin && (
                                <button onClick={() => { setEditMode(!editMode); setEditingIdx(null); setShowAddForm(false); }}
                                    className={"px-3 py-1.5 rounded-lg text-xs font-bold transition " + (editMode ? "bg-mint-100 text-mint-700 border border-mint-200" : "bg-gray-100 text-gray-600 hover:bg-gray-200")}>
                                    {editMode ? (language === "es" ? "Listo" : "Done") : "✏️ " + (language === "es" ? "Editar" : "Edit")}
                                </button>
                            )}
                        </div>

                        {/* Task list */}
                        {tasks.length === 0 && !editMode && (
                            <div className="text-center py-6 text-gray-400 text-sm">
                                {language === "es" ? "No hay tareas para este período" : "No tasks for this period"}
                            </div>
                        )}

                        {tasks.map((item, idx) => {
                            const hasSubtasks = item.subtasks && item.subtasks.length > 0;
                            const taskComplete = isTaskComplete(item);
                            const photoUrl = checks[item.id + "_photo"];
                            const photoNeeded = item.requirePhoto && !photoUrl;

                            // Compute urgency for flashing: "warning" (30 min before), "overdue" (past time)
                            let taskUrgency = null;
                            if (item.completeBy && !taskComplete) {
                                const now = new Date();
                                const curMin = now.getHours() * 60 + now.getMinutes();
                                const [dh, dm] = item.completeBy.split(":").map(Number);
                                const deadMin = dh * 60 + dm;
                                if (curMin >= deadMin) taskUrgency = "overdue";
                                else if (curMin >= deadMin - 30) taskUrgency = "warning";
                            }

                            if (editingIdx === idx) {
                                return (
                                    <div key={item.id} className="p-3 rounded-lg border-2 border-blue-300 bg-blue-50">
                                        <input type="text" value={editTask} onChange={e => setEditTask(e.target.value)}
                                            className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm mb-2 focus:outline-none focus:border-blue-400" autoFocus />
                                        {/* Complete by time */}
                                        <div className="flex items-center gap-2 mb-2">
                                            <label className="text-xs font-bold text-gray-600">⏰ {language === "es" ? "Completar antes de:" : "Complete by:"}</label>
                                            <input type="time" value={editCompleteBy} onChange={e => setEditCompleteBy(e.target.value)}
                                                className="border border-gray-200 rounded px-2 py-1 text-xs" />
                                            {editCompleteBy && <button onClick={() => setEditCompleteBy("")} className="text-red-400 text-xs">✕</button>}
                                        </div>
                                        {/* Notify / assign to */}
                                        {editCompleteBy && (
                                            <div className="flex items-center gap-2 mb-2">
                                                <label className="text-xs font-bold text-gray-600">🔔 {language === "es" ? "Notificar a:" : "Notify:"}</label>
                                                <select value={editAssignTo} onChange={e => setEditAssignTo(e.target.value)}
                                                    className="border border-gray-200 rounded px-2 py-1 text-xs flex-1">
                                                    <option value="">{language === "es" ? "— Nadie —" : "— Nobody —"}</option>
                                                    {(staffList || []).map(s => (
                                                        <option key={s.id} value={s.name}>{s.name}</option>
                                                    ))}
                                                </select>
                                                {editAssignTo && <button onClick={() => setEditAssignTo("")} className="text-red-400 text-xs">✕</button>}
                                            </div>
                                        )}
                                        {/* Photo toggle */}
                                        <label className="flex items-center gap-2 mb-2 text-xs cursor-pointer">
                                            <input type="checkbox" checked={editRequirePhoto} onChange={e => setEditRequirePhoto(e.target.checked)} className="w-4 h-4" />
                                            <span className="font-bold text-gray-600">📸 {language === "es" ? "Requiere foto" : "Require photo"}</span>
                                        </label>
                                        {/* Subtasks editor */}
                                        <div className="mb-2">
                                            <p className="text-xs font-bold text-gray-500 mb-1">{language === "es" ? "Subtareas" : "Subtasks"}</p>
                                            {editSubtasks.map((sub, si) => (
                                                <div key={si} className="flex gap-1 mb-1">
                                                    <input className="flex-1 border border-gray-200 rounded px-2 py-1 text-xs" value={sub.task}
                                                        onChange={e => { const u = [...editSubtasks]; u[si] = {...u[si], task: e.target.value}; setEditSubtasks(u); }}
                                                        placeholder={(language === "es" ? "Subtarea " : "Subtask ") + (si+1)} />
                                                    <button onClick={() => setEditSubtasks(editSubtasks.filter((_,i) => i !== si))} className="text-red-400 text-xs px-1">✕</button>
                                                </div>
                                            ))}
                                            <button onClick={() => setEditSubtasks([...editSubtasks, {id: "", task: ""}])}
                                                className="text-xs text-mint-700 font-bold">+ {language === "es" ? "Agregar subtarea" : "Add subtask"}</button>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <button onClick={() => saveChecklistEdit(idx)}
                                                className="px-3 py-1.5 bg-blue-600 text-white text-xs font-bold rounded-lg">{language === "es" ? "Guardar" : "Save"}</button>
                                            <button onClick={() => { setEditingIdx(null); setEditSubtasks([]); setEditCompleteBy(""); setEditAssignTo(""); }}
                                                className="px-3 py-1.5 bg-gray-100 text-gray-600 text-xs font-bold rounded-lg">{language === "es" ? "Cancelar" : "Cancel"}</button>
                                        </div>
                                    </div>
                                );
                            }

                            return (
                                <div key={item.id} className={"rounded-lg border-2 transition overflow-hidden " +
                                    (taskComplete ? "border-green-300 bg-green-50"
                                        : taskUrgency === "overdue" ? "task-flash-red"
                                        : taskUrgency === "warning" ? "task-flash-yellow"
                                        : "border-gray-200 bg-white")}>
                                    <div className="flex items-center gap-1">
                                        <div className={"flex-1 flex items-start p-3 " + (!editMode && !hasSubtasks ? "cursor-pointer" : "")}>
                                            {!editMode && !hasSubtasks && (
                                                <input type="checkbox" checked={checks[item.id] || false}
                                                    onChange={() => toggleCheckItem(item.id)}
                                                    className="w-5 h-5 text-mint-700 rounded focus:ring-2 focus:ring-mint-700 mt-0.5" />
                                            )}
                                            <div className={"flex-1 " + (!editMode && !hasSubtasks ? "ml-3" : "")}>
                                                <div className="flex items-center gap-1.5">
                                                    <p className={"font-bold text-gray-800 " + (taskComplete ? "line-through text-green-700" : "")}>
                                                        {item.task.includes("\n") ? item.task.split("\n").map((line, li) => (
                                                            <span key={li}>{li === 0 ? line : <><br/><span className="font-normal text-xs text-gray-500">{line}</span></>}</span>
                                                        )) : item.task}
                                                    </p>
                                                    {item.requirePhoto && <span className="text-xs">📸</span>}
                                                    {item.completeBy && (
                                                        <span className={`text-xs font-bold px-1.5 py-0.5 rounded-full whitespace-nowrap ${
                                                            taskComplete ? "bg-green-100 text-green-600"
                                                            : taskUrgency === "overdue" ? "bg-red-600 text-white"
                                                            : taskUrgency === "warning" ? "bg-yellow-400 text-yellow-900"
                                                            : "bg-orange-100 text-orange-600"
                                                        }`}>
                                                            {taskUrgency === "overdue" ? "🚨" : "⏰"} {item.completeBy.replace(/^0/, "")}
                                                        </span>
                                                    )}
                                                    {item.assignTo && (
                                                        <span className="text-xs font-bold px-1.5 py-0.5 rounded-full whitespace-nowrap bg-blue-100 text-blue-600">
                                                            🔔 {item.assignTo.split(" ")[0]}
                                                        </span>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                        {editMode && (
                                            <div className="flex flex-col gap-1 pr-2">
                                                <button onClick={() => { setEditingIdx(idx); setEditTask(item.task); setEditRequirePhoto(!!item.requirePhoto); setEditCompleteBy(item.completeBy || ""); setEditAssignTo(item.assignTo || ""); setEditSubtasks(item.subtasks ? item.subtasks.map(s => ({...s})) : []); setShowAddForm(false); }}
                                                    className="p-1.5 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100">✏️</button>
                                                <button onClick={() => deleteChecklistTask(idx)}
                                                    className="p-1.5 rounded-lg bg-red-50 text-red-600 hover:bg-red-100">🗑️</button>
                                            </div>
                                        )}
                                    </div>

                                    {/* Subtasks */}
                                    {hasSubtasks && !editMode && (
                                        <div className="px-3 pb-2 space-y-1 ml-4 border-t border-gray-100 pt-2">
                                            {item.subtasks.map(sub => (
                                                <label key={sub.id} className="flex items-center gap-2 cursor-pointer">
                                                    <input type="checkbox" checked={checks[sub.id] || false}
                                                        onChange={() => toggleCheckItem(sub.id)}
                                                        className="w-4 h-4 text-mint-600 rounded" />
                                                    <span className={"text-sm " + (checks[sub.id] ? "line-through text-green-600" : "text-gray-700")}>{sub.task}</span>
                                                </label>
                                            ))}
                                        </div>
                                    )}

                                    {/* Photo capture */}
                                    {item.requirePhoto && !editMode && (
                                        <div className="px-3 pb-3 border-t border-gray-100 pt-2">
                                            {photoUrl ? (
                                                <div>
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className="text-xs text-green-600 font-bold">✓ {language === "es" ? "Foto tomada" : "Photo taken"}</span>
                                                        <span className="text-xs text-gray-400">{checks[item.id + "_photoTime"] ? new Date(checks[item.id + "_photoTime"]).toLocaleTimeString() : ""}</span>
                                                    </div>
                                                    <img src={photoUrl} alt="Task photo" className="rounded-lg border border-gray-200 max-w-full cursor-pointer" style={{ maxHeight: "150px" }}
                                                        onClick={() => window.open(photoUrl, "_blank")} />
                                                </div>
                                            ) : (
                                                <div>
                                                    <input type="file" accept="image/*" capture="environment"
                                                        ref={capturingPhoto === item.id ? photoInputRef : null}
                                                        onChange={e => handlePhotoCapture(e, item.id)}
                                                        className="hidden" id={"photo-" + item.id} />
                                                    <button onClick={() => { setCapturingPhoto(item.id); document.getElementById("photo-" + item.id)?.click(); }}
                                                        disabled={capturingPhoto === item.id}
                                                        className="flex items-center gap-1.5 px-3 py-1.5 bg-blue-50 border border-blue-200 rounded-lg text-xs font-bold text-blue-700 hover:bg-blue-100 transition">
                                                        {capturingPhoto === item.id
                                                            ? (language === "es" ? "⏳ Subiendo..." : "⏳ Uploading...")
                                                            : (language === "es" ? "📸 Tomar foto" : "📸 Take photo")}
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            );
                        })}

                        {editMode && !showAddForm && (
                            <button onClick={() => { setShowAddForm(true); setEditingIdx(null); }}
                                className="w-full mt-2 p-3 rounded-lg border-2 border-dashed border-gray-300 text-gray-500 text-sm font-bold hover:border-mint-300 hover:text-mint-600 hover:bg-mint-50 transition flex items-center justify-center gap-2">
                                + {language === "es" ? "Agregar tarea" : "Add task"}
                            </button>
                        )}

                        {editMode && showAddForm && (
                            <div className="mt-2 p-3 rounded-lg border-2 border-green-300 bg-green-50">
                                <input type="text" value={newTask} onChange={e => setNewTask(e.target.value)}
                                    placeholder={language === "es" ? "Nueva tarea..." : "New task..."}
                                    className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm mb-2 focus:outline-none focus:border-green-400" autoFocus />
                                {/* Complete by time */}
                                <div className="flex items-center gap-2 mb-2">
                                    <label className="text-xs font-bold text-gray-600">⏰ {language === "es" ? "Completar antes de:" : "Complete by:"}</label>
                                    <input type="time" value={newCompleteBy} onChange={e => setNewCompleteBy(e.target.value)}
                                        className="border border-gray-200 rounded px-2 py-1 text-xs" />
                                    {newCompleteBy && <button onClick={() => setNewCompleteBy("")} className="text-red-400 text-xs">✕</button>}
                                </div>
                                {/* Notify / assign to */}
                                {newCompleteBy && (
                                    <div className="flex items-center gap-2 mb-2">
                                        <label className="text-xs font-bold text-gray-600">🔔 {language === "es" ? "Notificar a:" : "Notify:"}</label>
                                        <select value={newAssignTo} onChange={e => setNewAssignTo(e.target.value)}
                                            className="border border-gray-200 rounded px-2 py-1 text-xs flex-1">
                                            <option value="">{language === "es" ? "— Nadie —" : "— Nobody —"}</option>
                                            {(staffList || []).map(s => (
                                                <option key={s.id} value={s.name}>{s.name}</option>
                                            ))}
                                        </select>
                                        {newAssignTo && <button onClick={() => setNewAssignTo("")} className="text-red-400 text-xs">✕</button>}
                                    </div>
                                )}
                                {/* Photo toggle */}

        // Schedule Component with Shift Scheduling, Availability, Time Off, Labor Tracking
        // PokeDoke Locations
        const POKEDOKE_LOCATIONS = [
            { id: "cwe", name: "Central West End", nameEs: "Central West End", short: "CWE" },
            { id: "kirkwood", name: "Kirkwood", nameEs: "Kirkwood", short: "KWD" }
        ];

        // Schedule Roles/Stations
        const SCHEDULE_ROLES = ["FOH", "Manager", "Bowl Line", "Push Pops", "Proteins", "Rice", "Toppings", "Boba/Drinks", "Prep", "Dish", "Shift Lead"];

        // Default hourly rate for labor estimation
        const DEFAULT_HOURLY_RATE = 14;

        function Schedule({ staffName, language, staffList, staffIsAdmin }) {
            const [subTab, setSubTab] = useState("schedule");
            const [locationId, setLocationId] = useState("cwe");
            const [weekOffset, setWeekOffset] = useState(0);
            const [selectedDayIdx, setSelectedDayIdx] = useState(new Date().getDay() === 0 ? 6 : new Date().getDay() - 1);
            const [scheduleView, setScheduleView] = useState("daily"); // "daily" | "weekly"

            // Shift scheduling state
            const [weekShifts, setWeekShifts] = useState([]);
            const [showShiftForm, setShowShiftForm] = useState(false);
            const [editingShift, setEditingShift] = useState(null);
            const [shiftForm, setShiftForm] = useState({ staffName: "", startTime: "10:00", endTime: "18:00", role: "FOH" });
            const [shiftSaving, setShiftSaving] = useState(false);
            const [shiftMsg, setShiftMsg] = useState("");
            const [hourlyRate, setHourlyRate] = useState(DEFAULT_HOURLY_RATE);
            const [isPublished, setIsPublished] = useState(false);

            // Time off state
            const [requests, setRequests] = useState([]);
            const [showTOForm, setShowTOForm] = useState(false);
            const [selectedRequest, setSelectedRequest] = useState(null);
            const [toViewMode, setToViewMode] = useState("calendar");
            const [toFormData, setToFormData] = useState({ startDate: "", endDate: "", type: "vacation", reason: "" });
            const [toSubmitting, setToSubmitting] = useState(false);
            const [toSuccessMsg, setToSuccessMsg] = useState("");
            const [filterTab, setFilterTab] = useState(staffIsAdmin ? "all" : "mine");

            // Availability state
            const [avail, setAvail] = useState({
                monday: { available: true, start: "10:00", end: "20:00" },
                tuesday: { available: true, start: "10:00", end: "20:00" },
                wednesday: { available: true, start: "10:00", end: "20:00" },
                thursday: { available: true, start: "10:00", end: "20:00" },
                friday: { available: true, start: "10:00", end: "20:00" },
                saturday: { available: true, start: "10:00", end: "20:00" },
                sunday: { available: true, start: "10:00", end: "20:00" }
            });
            const [availSaving, setAvailSaving] = useState(false);
            const [availMsg, setAvailMsg] = useState("");
            const [allAvailability, setAllAvailability] = useState({});

            // ─── Date Helpers ───
            const getWeekDates = (offset) => {
                const now = new Date();
                const dow = now.getDay();
                const monOff = dow === 0 ? -6 : 1 - dow;
                const mon = new Date(now);
                mon.setDate(now.getDate() + monOff + (offset * 7));
                mon.setHours(0,0,0,0);
                const days = [];
                for (let i = 0; i < 7; i++) { const d = new Date(mon); d.setDate(mon.getDate() + i); days.push(d); }
                return days;
            };
            const weekDates = getWeekDates(weekOffset);
            const weekStart = weekDates[0];
            const weekEnd = weekDates[6];
            const dayKeys = ["monday","tuesday","wednesday","thursday","friday","saturday","sunday"];
            const dayNamesShort = language === "es" ? ["L","M","X","J","V","S","D"] : ["M","T","W","T","F","S","S"];
            const dayNamesFull = language === "es"
                ? ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"]
                : ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
            const monthNames = language === "es"
                ? ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"]
                : ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            const toDateStr = (d) => d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
            const fmtDate = (d) => `${monthNames[d.getMonth()]} ${d.getDate()}`;
            const today = toDateStr(new Date());
            const selectedDate = weekDates[selectedDayIdx];
            const selectedDateStr = toDateStr(selectedDate);
            const weekStartStr = toDateStr(weekStart);

            // ─── Firestore: Load shifts for current week+location ───
            useEffect(() => {
                const docId = `${locationId}_${weekStartStr}`;
                const unsub = db.collection("schedules").doc(docId).onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        setWeekShifts(data.shifts || []);
                        setIsPublished(!!data.published);
                        if (data.hourlyRate) setHourlyRate(data.hourlyRate);
                    } else {
                        setWeekShifts([]);
                        setIsPublished(false);
                    }
                });
                return () => unsub();
            }, [locationId, weekStartStr]);

            // ─── Firestore: Load time off requests ───
            useEffect(() => {
                const unsub = db.collection("timeOffRequests").orderBy("submittedAt", "desc").onSnapshot((snap) => {
                    const items = [];
                    snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                    setRequests(items);
                });
                return () => unsub();
            }, []);

            // ─── Firestore: Load own availability ───
            useEffect(() => {
                const unsub = db.collection("availability").doc(staffName).onSnapshot((doc) => {
                    if (doc.exists && doc.data().schedule) {
                        setAvail(doc.data().schedule);
                    }
                });
                return () => unsub();
            }, [staffName]);

            // ─── Firestore: Load all availability (for admin scheduling) ───
            useEffect(() => {
                if (!staffIsAdmin) return;
                const unsub = db.collection("availability").onSnapshot((snap) => {
                    const all = {};
                    snap.forEach(doc => { all[doc.id] = doc.data().schedule || {}; });
                    setAllAvailability(all);
                });
                return () => unsub();
            }, [staffIsAdmin]);

            // ─── Shift CRUD ───
            const saveShifts = async (newShifts, pub) => {
                const docId = `${locationId}_${weekStartStr}`;
                await db.collection("schedules").doc(docId).set({
                    locationId, weekStart: weekStartStr,
                    shifts: newShifts,
                    published: pub !== undefined ? pub : isPublished,
                    hourlyRate,
                    updatedAt: new Date().toISOString(),
                    updatedBy: staffName
                }, { merge: true });
            };

            const handleAddShift = async () => {
                if (!shiftForm.staffName || !shiftForm.startTime || !shiftForm.endTime) return;
                setShiftSaving(true);
                const newShift = {
                    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
                    staffName: shiftForm.staffName,
                    day: selectedDateStr,
                    startTime: shiftForm.startTime,
                    endTime: shiftForm.endTime,
                    role: shiftForm.role
                };
                const updated = editingShift
                    ? weekShifts.map(s => s.id === editingShift.id ? { ...newShift, id: editingShift.id } : s)
                    : [...weekShifts, newShift];
                try {
                    await saveShifts(updated);
                    setShowShiftForm(false);
                    setEditingShift(null);
                    setShiftForm({ staffName: "", startTime: "10:00", endTime: "18:00", role: "FOH" });
                    setShiftMsg(t("scheduleSaved", language));
                    setTimeout(() => setShiftMsg(""), 2000);
                } catch(e) { console.error(e); }
                setShiftSaving(false);
            };

            const handleDeleteShift = async (shiftId) => {
                if (!confirm(language === "es" ? "¿Eliminar este turno?" : "Delete this shift?")) return;
                const updated = weekShifts.filter(s => s.id !== shiftId);
                await saveShifts(updated);
            };

            const openEditShift = (shift) => {
                setEditingShift(shift);
                setShiftForm({ staffName: shift.staffName, startTime: shift.startTime, endTime: shift.endTime, role: shift.role });
                setShowShiftForm(true);
            };

            // ─── Day's shifts ───
            const dayShifts = weekShifts.filter(s => s.day === selectedDateStr)
                .sort((a,b) => a.startTime.localeCompare(b.startTime));

            // ─── Labor calculation ───
            const calcHours = (s) => {
                const [sh,sm] = s.startTime.split(":").map(Number);
                const [eh,em] = s.endTime.split(":").map(Number);
                return Math.max(0, (eh + em/60) - (sh + sm/60));
            };
            const dayHours = dayShifts.reduce((sum,s) => sum + calcHours(s), 0);
            const weekHours = weekShifts.reduce((sum,s) => sum + calcHours(s), 0);
            const dayLaborCost = (dayHours * hourlyRate).toFixed(0);
            const weekLaborCost = (weekHours * hourlyRate).toFixed(0);

            // ─── Time off helpers (reused) ───
            const requestOverlapsDate = (req, dateStr) => req.startDate <= dateStr && req.endDate >= dateStr;
            const statusColor = (status) => {
                if (status === "approved") return { bg: "bg-green-100", border: "border-green-400", text: "text-green-700", dot: "bg-green-500" };
                if (status === "denied") return { bg: "bg-red-100", border: "border-red-300", text: "text-red-600", dot: "bg-red-500" };
                return { bg: "bg-amber-100", border: "border-amber-400", text: "text-amber-700", dot: "bg-amber-500" };
            };
            const typeEmoji = (type) => ({ vacation: "🏖️", personal: "🙋", other: "📋" }[type] || "📋");

            // ─── Time off CRUD ───
            const handleTOSubmit = async () => {
                if (!toFormData.startDate || !toFormData.endDate || !toFormData.reason.trim()) return;
                setToSubmitting(true);
                try {
                    await db.collection("timeOffRequests").add({
                        staffName, startDate: toFormData.startDate, endDate: toFormData.endDate,
                        type: toFormData.type, reason: toFormData.reason.trim(), status: "pending",
                        submittedAt: new Date().toISOString(), reviewedBy: null, reviewedAt: null, adminNotes: ""
                    });
                    setToFormData({ startDate: "", endDate: "", type: "vacation", reason: "" });
                    setShowTOForm(false);
                    setToSuccessMsg(t("requestSubmitted", language));
                    setTimeout(() => setToSuccessMsg(""), 3000);
                } catch(e) { console.error(e); }
                setToSubmitting(false);
            };

            const handleTOReview = async (reqId, newStatus) => {
                await db.collection("timeOffRequests").doc(reqId).update({
                    status: newStatus, reviewedBy: staffName, reviewedAt: new Date().toISOString()
                });
                setSelectedRequest(prev => prev ? { ...prev, status: newStatus, reviewedBy: staffName } : null);
            };

            const handleTODelete = async (reqId) => {
                if (!confirm(language === "es" ? "¿Eliminar esta solicitud?" : "Delete this request?")) return;
                await db.collection("timeOffRequests").doc(reqId).delete();
                setSelectedRequest(null);
            };

            // ─── Availability save ───
            const handleSaveAvail = async () => {
                setAvailSaving(true);
                try {
                    await db.collection("availability").doc(staffName).set({ staffName, schedule: avail, updatedAt: new Date().toISOString() });
                    setAvailMsg(t("availabilitySaved", language));
                    setTimeout(() => setAvailMsg(""), 2000);
                } catch(e) { console.error(e); }
                setAvailSaving(false);
            };

            // ─── Get staff availability for a day (for admin view) ───
            const getStaffAvailForDay = (name, dayKey) => {
                const a = allAvailability[name];
                if (!a || !a[dayKey]) return { available: true, start: "", end: "" };
                return a[dayKey];
            };

            // ─── Time off on a day for a staff member ───
            const staffHasTimeOff = (name, dateStr) => requests.some(r =>
                r.staffName === name && r.status !== "denied" && requestOverlapsDate(r, dateStr));

            // ─── My upcoming shifts (all locations) ───
            const [myAllShifts, setMyAllShifts] = useState([]);
            useEffect(() => {
                const unsub = db.collection("schedules").onSnapshot((snap) => {
                    const all = [];
                    snap.forEach(doc => {
                        const data = doc.data();
                        if (!data.shifts) return;
                        data.shifts.filter(s => s.staffName === staffName).forEach(s => {
                            all.push({ ...s, locationId: data.locationId, published: data.published });
                        });
                    });
                    all.sort((a,b) => a.day.localeCompare(b.day) || a.startTime.localeCompare(b.startTime));
                    setMyAllShifts(all);
                });
                return () => unsub();
            }, [staffName]);

            const upcomingShifts = myAllShifts.filter(s => s.day >= today && (s.published || staffIsAdmin));

            // ─── Filtered time off for list ───
            const filteredRequests = filterTab === "mine" ? requests.filter(r => r.staffName === staffName) : requests;

            return (

                                        <p key={i} className="text-xs text-amber-600">{typeEmoji(r.type)} {r.staffName} — <span className="font-bold">{r.status}</span></p>

                            {/* Shift list */}
                            {dayShifts.length === 0 ? (

                                    {dayShifts.map(shift => {
                                        const hasTO = staffHasTimeOff(shift.staffName, selectedDateStr);
                                        return (
                                            <div key={shift.id}
                                                className={`p-3 rounded-lg border-2 ${shift.staffName === staffName ? "bg-mint-50 border-mint-300" : hasTO ? "bg-red-50 border-red-200" : "bg-white border-gray-200"}`}>
                                                <div className="flex items-center justify-between">
                                                    <div className="flex-1">
                                                        <p className="font-bold text-gray-800 text-sm">
                                                            {shift.staffName === staffName && "★ "}{shift.staffName}
                                                            {hasTO && <span className="ml-1 text-red-500 text-xs">⚠️ OFF</span>}
                                                        </p>
                                                        <p className="text-xs text-gray-500">{shift.startTime} — {shift.endTime} · {shift.role}</p>
                                                        <p className="text-[10px] text-gray-400">{calcHours(shift).toFixed(1)}h</p>
                                                    </div>
                                                    {staffIsAdmin && (
                                                        <div className="flex gap-1">
                                                            <button onClick={() => openEditShift(shift)} className="text-xs bg-gray-100 px-2 py-1 rounded hover:bg-gray-200">✏️</button>
                                                            <button onClick={() => handleDeleteShift(shift.id)} className="text-xs bg-red-50 px-2 py-1 rounded hover:bg-red-100 text-red-500">🗑️</button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            </div>)}

                            {/* ── WEEKLY GRID VIEW ── */}
                            {scheduleView === "weekly" && (
                                <div className="bg-white rounded-lg border-2 border-gray-200 overflow-x-auto">
                                    {/* Day headers */}
                                    <div className="grid grid-cols-[100px_repeat(7,1fr)] min-w-[600px] border-b bg-gradient-to-r from-mint-50 to-white sticky top-0">
                                        <div className="p-2 border-r border-gray-200 flex items-center">
                                            <p className="text-[10px] font-bold text-gray-400">{language === "es" ? "PERSONAL" : "STAFF"}</p>
                                        </div>
                                        {weekDates.map((d, i) => {
                                            const ds = toDateStr(d);
                                            const isToday = ds === today;
                                            const colShifts = weekShifts.filter(s => s.day === ds);
                                            const colHrs = colShifts.reduce((sum,s) => sum + calcHours(s), 0);
                                            return (
                                                <div key={i} className={`text-center py-2 ${i > 0 ? "border-l border-gray-200" : ""} ${isToday ? "bg-mint-50" : ""}`}>
                                                    <p className="text-[10px] font-bold text-gray-500">{dayNamesShort[i]}</p>
                                                    <p className={`text-sm font-bold ${isToday ? "text-mint-700" : "text-gray-700"}`}>{d.getDate()}</p>
                                                    <p className="text-[9px] text-gray-400">{colShifts.length}s · {colHrs.toFixed(0)}h</p>
                                                </div>
                                            );
                                        })}
                                    </div>

                                    {/* Staff rows */}
                                    {(() => {
                                        const staffWithShifts = [...new Set(weekShifts.map(s => s.staffName))].sort();
                                        if (staffWithShifts.length === 0) return (
                                            <div className="py-8 text-center text-gray-400 min-w-[600px]">
                                                <p className="text-3xl mb-2">📭</p>
                                                <p className="text-sm">{t("noShiftsDay", language)}</p>
                                            </div>
                                        );
                                        return staffWithShifts.map((name, sIdx) => (
                                            <div key={sIdx} className={`grid grid-cols-[100px_repeat(7,1fr)] min-w-[600px] border-t ${name === staffName ? "bg-mint-50" : sIdx % 2 === 0 ? "bg-white" : "bg-gray-50"}`}>
                                                <div className="p-2 border-r border-gray-200 flex items-center">
                                                    <p className="text-xs font-bold text-gray-700 truncate">{name === staffName ? "★ " : ""}{name.split(" ")[0]}</p>

                                                {weekDates.map((d, dIdx) => {
                                                    const ds = toDateStr(d);

                                                    const hasTO = staffHasTimeOff(name, ds);
                                                    return (
                                                        <div key={dIdx} className={`p-0.5 ${dIdx > 0 ? "border-l border-gray-100" : ""} min-h-[44px] ${hasTO ? "bg-red-50" : ""}`}
                                                            onClick={() => { if (staffIsAdmin) { setScheduleView("daily"); setSelectedDayIdx(dIdx); } }}>
                                                            {hasTO && cellShifts.length === 0 && (

                                                            {cellShifts.map((sh, shIdx) => (

                                                                    <p className="text-[7px] text-gray-500 truncate">{sh.role}</p>

        // Pokedoke Location Coordinates
        const DD_MAU_LOCATIONS = [
            { name: "Location 1", lat: 0.0, lng: 0.0 },
            { name: "Location 2", lat: 0.0, lng: 0.0 }
        ];
        const GEOFENCE_RADIUS_FEET = 500;

        // Haversine distance in feet
        function getDistanceFeet(lat1, lng1, lat2, lng2) {
            const R = 20902231; // Earth radius in feet
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function isWithinGeofence(lat, lng) {
            return DD_MAU_LOCATIONS.some(loc =>
                getDistanceFeet(lat, lng, loc.lat, loc.lng) <= GEOFENCE_RADIUS_FEET
            );
        }

        // Geofence hook
        function useGeofence() {
            const [isAtDDMau, setIsAtDDMau] = useState(false);
            const [checking, setChecking] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!navigator.geolocation) {
                    setError("noGeo");
                    setChecking(false);
                    return;
                }

                const watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        const inside = isWithinGeofence(pos.coords.latitude, pos.coords.longitude);
                        setIsAtDDMau(inside);
                        setChecking(false);
                        setError(null);
                    },
                    (err) => {
                        setError(err.code === 1 ? "denied" : "unavailable");
                        setChecking(false);
                    },
                    { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 }
                );

                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            return { isAtDDMau, checking, error };
        }

        // Recipe Form Component
        function RecipeForm({ language, recipe, onSave, onCancel }) {
            const isEdit = !!recipe;
            const [form, setForm] = useState(recipe || {

                prepTimeEn: "", cookTimeEn: "",
                yieldsEn: "", yieldsEs: "",
                ingredientsEn: [""], ingredientsEs: [""],
                instructionsEn: [""], instructionsEs: [""]
            });

            const updateField = (field, val) => setForm(prev => ({ ...prev, [field]: val }));
            const updateListItem = (field, idx, val) => {
                const arr = [...form[field]];
                arr[idx] = val;
                setForm(prev => ({ ...prev, [field]: arr }));
            };
            const addListItem = (field) => setForm(prev => ({ ...prev, [field]: [...prev[field], ""] }));
            const removeListItem = (field, idx) => {
                if (form[field].length <= 1) return;
                setForm(prev => ({ ...prev, [field]: prev[field].filter((_, i) => i !== idx) }));
            };

            const handleSave = () => {
                if (!form.titleEn.trim()) { alert(language === "es" ? "Se requiere título en inglés" : "English title is required"); return; }
                const cleaned = {
                    ...form,
                    ingredientsEn: form.ingredientsEn.filter(s => s.trim()),
                    ingredientsEs: form.ingredientsEs.filter(s => s.trim()),
                    instructionsEn: form.instructionsEn.filter(s => s.trim()),
                    instructionsEs: form.instructionsEs.filter(s => s.trim()),
                };
                if (cleaned.ingredientsEn.length === 0) cleaned.ingredientsEn = [""];
                if (cleaned.instructionsEn.length === 0) cleaned.instructionsEn = [""];
                if (cleaned.ingredientsEs.length === 0) cleaned.ingredientsEs = [""];
                if (cleaned.instructionsEs.length === 0) cleaned.instructionsEs = [""];
                onSave(cleaned);
            };

            const renderListEditor = (field, label) => (
                <div className="mb-4">
                    <label className="block text-xs font-bold text-gray-600 mb-1">{label}</label>

                        <div key={i} className="flex gap-1 mb-1">

                            <input
                                className="flex-1 border border-gray-300 rounded px-2 py-1 text-sm"
                                value={item}
                                onChange={e => updateListItem(field, i, e.target.value)}
                                placeholder={`${label} ${i + 1}`}
                            />
                            <button onClick={() => removeListItem(field, i)} className="text-red-400 text-sm px-1">✕</button>
                        </div>
                    ))}
                    <button onClick={() => addListItem(field)} className="text-xs text-mint-700 font-bold mt-1">{language === "es" ? "+ Agregar" : "+ Add"}</button>
                </div>

            return (
                <div className="p-4 pb-24">

                    <div className="space-y-3">
                        <div className="flex gap-2">
                            <div className="w-16">
