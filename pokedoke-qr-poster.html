<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokedoke Staff Portal - QR Code</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  @page {
    size: letter;
    margin: 0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #f0f7f1;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .poster {
    width: 7.5in;
    min-height: 10in;
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Top mint banner */
  .banner {
    width: 100%;
    background: linear-gradient(135deg, #3d8b54 0%, #5fa872 50%, #3d8b54 100%);
    padding: 48px 40px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .banner::before {
    content: '';
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }

  .banner::after {
    content: '';
    position: absolute;
    bottom: -40px;
    left: -40px;
    width: 150px;
    height: 150px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 56px;
    font-weight: 700;
    color: white;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 50px 40px 40px;
    text-align: center;
  }

  .scan-label {
    font-size: 15px;
    font-weight: 600;
    color: #3d8b54;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .qr-container {
    background: white;
    border: 3px solid #d9ecdb;
    border-radius: 20px;
    padding: 24px;
    display: inline-block;
    margin-bottom: 30px;
    box-shadow: 0 4px 20px rgba(61,139,84,0.1);
  }

  #qrcode {
    width: 280px;
    height: 280px;
  }

  #qrcode img {
    width: 280px !important;
    height: 280px !important;
  }

  #qrcode canvas {
    width: 280px !important;
    height: 280px !important;
  }

  .portal-name {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: #2B2E35;
    margin-bottom: 8px;
  }

  .portal-desc {
    font-size: 16px;
    color: #666;
    line-height: 1.5;
    max-width: 400px;
    margin-bottom: 36px;
  }

  .features {
    display: flex;
    gap: 32px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }

  .feature {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .feature-icon {
    width: 44px;
    height: 44px;
    background: #f0f7f1;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .feature-label {
    font-size: 12px;
    font-weight: 600;
    color: #2B2E35;
    letter-spacing: 0.5px;
  }

  /* Bottom bar */
  .bottom-bar {
    width: 100%;
    background: #2B2E35;
    padding: 20px 40px;
    text-align: center;
  }

  .url-text {
    font-size: 16px;
    font-weight: 500;
    color: #8ec49a;
    letter-spacing: 1px;
  }

  .bilingual-note {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 6px;
  }

  /* Print styles */
  @media print {
    body {
      background: white;
      padding: 0;
      display: block;
    }
    .poster {
      width: 100%;
      min-height: 100vh;
      border-radius: 0;
      box-shadow: none;
    }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>

<div class="poster">
  <div class="banner">
    <div class="logo-text">Pokedoke</div>
    <div class="subtitle">Vietnamese Eatery</div>
  </div>

  <div class="content">
    <div class="scan-label">&#9654;&ensp;Scan to Access&ensp;&#9664;</div>

    <div class="qr-container">
      <div id="qrcode"></div>
    </div>

    <div class="portal-name">Staff Portal</div>
    <div class="portal-desc">
      Training, checklists, inventory, recipes &amp; more — all in one place.
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">📋</div>
        <div class="feature-label">Training</div>
      </div>
      <div class="feature">
        <div class="feature-icon">✅</div>
        <div class="feature-label">Checklists</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📦</div>
        <div class="feature-label">Inventory</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🐟</div>
        <div class="feature-label">Recipes</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="url-text">YOUR-USERNAME.github.io/pokedoke-portal</div>
    <div class="bilingual-note">Available in English &amp; Spanish</div>
  </div>
</div>

<script>
  new QRCode(document.getElementById("qrcode"), {
    text: "https://YOUR-USERNAME.github.io/pokedoke-portal/",
    width: 280,
    height: 280,
    colorDark: "#2B2E35",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
</script>

</body>
</html>
